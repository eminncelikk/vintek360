<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Vintek360 — Operasyon Takip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#F2F4F8;--surface:#fff;--border:#E2E8F0;--border2:#CBD5E1;
      --t1:#0F1623;--t2:#475569;--t3:#94A3B8;
      --accent:#1B4FD8;--accent2:#0E3AB5;--accent-bg:#EEF3FF;
      --green:#059669;--green-bg:#ECFDF5;--green-lt:#D1FAE5;
      --amber:#D97706;--amber-bg:#FFFBEB;--amber-lt:#FEF3C7;
      --red:#DC2626;--red-bg:#FEF2F2;--red-lt:#FEE2E2;
      --purple:#7C3AED;--purple-bg:#F5F3FF;
      --teal:#0891B2;--teal-bg:#ECFEFF;
      /* Sidebar dark */
      --sb-bg:#0F172A;--sb-border:rgba(255,255,255,.06);
      --sb-text:rgba(255,255,255,.55);--sb-text-act:#fff;
      --sb-item-act:rgba(255,255,255,.09);--sb-item-hov:rgba(255,255,255,.05);
      --sb-grp:rgba(255,255,255,.25);
      --sw:232px;--tbh:60px;--r:12px;--rl:16px;
      --sh:0 1px 3px rgba(15,22,35,.05),0 1px 2px rgba(15,22,35,.03);
      --sm:0 4px 16px rgba(15,22,35,.08),0 1px 4px rgba(15,22,35,.04);
      --sl:0 12px 40px rgba(15,22,35,.14),0 4px 12px rgba(15,22,35,.07);
    }
    html,body{height:100%;background:var(--bg);font-family:'Inter',sans-serif;color:var(--t1);-webkit-tap-highlight-color:transparent}
    input,select,textarea,button{font-family:'Inter',sans-serif}
    input:focus,select:focus,textarea:focus{outline:none}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}

    /* ── Layout ── */
    #root{display:flex;min-height:100vh}

    /* ── SIDEBAR (dark) ── */
    .sidebar{
      width:var(--sw);background:var(--sb-bg);
      border-right:1px solid var(--sb-border);
      display:flex;flex-direction:column;
      position:fixed;top:0;left:0;bottom:0;z-index:60;
      transition:transform .3s cubic-bezier(.4,0,.2,1)
    }
    .sb-logo{
      padding:20px 18px 16px;
      display:flex;align-items:center;gap:11px;
      border-bottom:1px solid var(--sb-border)
    }
    .logo-ic{
      width:36px;height:36px;
      background:linear-gradient(140deg,#2563EB,#1B4FD8);
      border-radius:10px;display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 12px rgba(37,99,235,.4);flex-shrink:0
    }
    .logo-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:#fff;letter-spacing:-.2px;line-height:1.2}
    .logo-sub{font-size:9.5px;color:var(--sb-text);font-weight:500;letter-spacing:.5px;text-transform:uppercase;margin-top:1px}
    .sb-nav{flex:1;padding:12px 10px;overflow-y:auto}
    .nav-grp{font-size:9.5px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;color:var(--sb-grp);padding:0 8px;margin-bottom:4px;margin-top:20px}
    .nav-grp:first-child{margin-top:0}
    .nav-item{
      display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;
      cursor:pointer;border:none;background:none;width:100%;text-align:left;
      font-size:13px;font-weight:500;color:var(--sb-text);
      transition:background .12s,color .12s
    }
    .nav-item:hover{background:var(--sb-item-hov);color:rgba(255,255,255,.8)}
    .nav-item.active{background:var(--sb-item-act);color:var(--sb-text-act);font-weight:600}
    .nav-item.active .nav-ic{opacity:1}
    .nav-ic{width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:.6;color:currentColor}
    .nav-item.active .nav-ic{opacity:1}
    .nav-badge{
      margin-left:auto;font-size:10px;font-weight:700;
      padding:2px 7px;border-radius:10px;
      background:rgba(255,255,255,.15);color:rgba(255,255,255,.9)
    }
    .nav-badge.amber{background:#D97706;color:#fff}
    .sb-footer{
      padding:12px 16px;border-top:1px solid var(--sb-border);
      font-size:11px;color:var(--sb-text);
      display:flex;align-items:center;gap:7px
    }
    .db-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

    /* ── Main ── */
    .main-wrap{margin-left:var(--sw);flex:1;min-width:0;display:flex;flex-direction:column}
    .topbar{
      height:var(--tbh);background:var(--surface);
      border-bottom:1px solid var(--border);
      padding:0 26px;display:flex;align-items:center;justify-content:space-between;
      position:sticky;top:0;z-index:40;box-shadow:var(--sh)
    }
    .tb-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--t1);letter-spacing:-.3px}
    .tb-sub{font-size:11.5px;color:var(--t3);margin-top:1px}
    .page{padding:24px}

    /* ── Cards ── */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:20px;box-shadow:var(--sh)}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px 20px;box-shadow:var(--sh);position:relative;overflow:hidden;transition:box-shadow .2s,transform .18s}
    .stat-card:hover{box-shadow:var(--sm);transform:translateY(-1px)}
    .sc-lbl{font-size:10.5px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
    .sc-val{font-family:'DM Mono',monospace;font-size:21px;font-weight:500;color:var(--t1);letter-spacing:-.5px;line-height:1}
    .sc-sub{font-size:11.5px;color:var(--t3);margin-top:5px}
    .sc-ic{position:absolute;top:14px;right:14px;font-size:19px;opacity:.35}
    .stat-card.accent{background:linear-gradient(135deg,#1B4FD8,#0E3AB5);border-color:transparent}
    .stat-card.accent .sc-lbl,.stat-card.accent .sc-sub{color:rgba(255,255,255,.6)}
    .stat-card.accent .sc-val{color:#fff}
    .stat-card.dark{background:var(--sb-bg);border-color:transparent}
    .stat-card.dark .sc-lbl,.stat-card.dark .sc-sub{color:rgba(255,255,255,.5)}
    .stat-card.dark .sc-val{color:#fff}

    /* ── Grids ── */
    .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
    .g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .g23{display:grid;grid-template-columns:2fr 1fr;gap:20px;align-items:start}

    /* ── Section ── */
    .sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
    .sec-title{font-family:'Syne',sans-serif;font-size:14.5px;font-weight:800;color:var(--t1);letter-spacing:-.2px}

    /* ── Buttons ── */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:9px;font-size:12.5px;font-weight:600;cursor:pointer;border:none;transition:background .12s,transform .1s,box-shadow .12s;white-space:nowrap}
    .btn:active{transform:scale(.97)}
    .btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(27,79,216,.22)}
    .btn-primary:hover{background:var(--accent2)}
    .btn-sec{background:var(--bg);color:var(--t2);border:1px solid var(--border)}
    .btn-sec:hover{background:var(--border);color:var(--t1)}
    .btn-danger{background:var(--red-bg);color:var(--red);border:1px solid #FCA5A5}
    .btn-danger:hover{background:var(--red);color:#fff}
    .btn-green{background:var(--green);color:#fff;box-shadow:0 2px 8px rgba(5,150,105,.2)}
    .btn-green:hover{background:#047857}
    .btn-amber{background:var(--amber);color:#fff}
    .btn-amber:hover{background:#B45309}
    .btn-ic{width:29px;height:29px;padding:0;border-radius:8px;justify-content:center;background:var(--bg);color:var(--t3);border:1px solid var(--border)}
    .btn-ic:hover{color:var(--t1);background:var(--border)}
    .btn-full{width:100%;justify-content:center;padding:11px 18px;font-size:13.5px}
    .btn-xs{padding:4px 9px;font-size:11px;border-radius:7px}
    .btn-ghost-red{background:none;border:1px solid #FCA5A5;color:var(--red);border-radius:9px;padding:8px 14px;font-size:12.5px;font-weight:600;cursor:pointer}
    .btn-ghost-red:hover{background:var(--red);color:#fff}

    /* ── Form ── */
    .field{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:9px;color:var(--t1);padding:9px 12px;font-size:13.5px;transition:border-color .2s,box-shadow .2s}
    .field:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(27,79,216,.09)}
    .field option{background:var(--surface)}
    .lbl{font-size:10.5px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--t3);margin-bottom:5px;display:block}
    .irow{margin-bottom:12px}

    /* ── Table ── */
    .tbl-wrap{overflow-x:auto;border-radius:var(--rl);border:1px solid var(--border);background:var(--surface)}
    table{width:100%;border-collapse:collapse}
    th{font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--t3);padding:11px 15px;text-align:left;background:var(--bg);border-bottom:1px solid var(--border);white-space:nowrap}
    td{padding:12px 15px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#FAFBFD}

    /* ── Chip ── */
    .chip{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}

    /* ── Mono ── */
    .mono{font-family:'DM Mono',monospace}

    /* ── Toggle ── */
    .toggle-row{display:flex;align-items:center;gap:10px;margin-top:10px;cursor:pointer;user-select:none}
    .tog-track{width:38px;height:21px;border-radius:11px;background:var(--border2);flex-shrink:0;position:relative;transition:background .2s}
    .tog-track.on{background:var(--accent)}
    .tog-thumb{position:absolute;top:2.5px;left:2.5px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
    .tog-track.on .tog-thumb{transform:translateX(17px)}
    .tog-lbl{font-size:13px;font-weight:500;color:var(--t2)}

    /* ── Modal ── */
    .ov{position:fixed;inset:0;background:rgba(15,22,35,.48);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
    .mbox{background:var(--surface);border-radius:20px;padding:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:var(--sl)}
    .mhd{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
    .mtitle{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--t1)}

    /* ── Confirm ── */
    .cov{position:fixed;inset:0;background:rgba(15,22,35,.52);z-index:150;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
    .cbox{background:var(--surface);border-radius:16px;padding:24px 20px;width:100%;max-width:330px;box-shadow:var(--sl)}

    /* ── Toast ── */
    .toast{position:fixed;bottom:24px;right:24px;padding:10px 17px;border-radius:12px;font-size:12.5px;font-weight:600;z-index:300;white-space:nowrap;box-shadow:var(--sm);pointer-events:none;display:flex;align-items:center;gap:6px;animation:toastIn .22s ease}
    @keyframes toastIn{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}

    /* ── Tooltip ── */
    .tip-wrap{position:relative;display:inline-flex}
    .tip-box{position:fixed;background:var(--t1);color:#fff;border-radius:10px;padding:9px 12px;font-size:11.5px;white-space:nowrap;pointer-events:none;z-index:300;box-shadow:var(--sl);min-width:160px}
    .tt-row{display:flex;justify-content:space-between;gap:10px;margin-bottom:3px}
    .tt-row:last-child{margin-bottom:0}
    .tt-key{color:#94a3b8;font-size:11px}
    .tt-val{font-weight:700;font-size:11px}

    /* ── Search ── */
    .srch-wrap{position:relative}
    .srch-wrap input{padding-left:34px}
    .srch-ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--t3);pointer-events:none}

    /* ── Autocomplete ── */
    .ac-wrap{position:relative}
    .ac-row{display:flex;gap:0;position:relative}
    .ac-inp{border-radius:9px 0 0 9px!important;flex:1}
    .ac-add{border-radius:0 9px 9px 0!important;border-left:none!important;flex-shrink:0;padding:9px 12px;font-size:12px;font-weight:600;background:var(--accent-bg);color:var(--accent);border:1.5px solid var(--border);cursor:pointer;transition:background .12s;white-space:nowrap}
    .ac-add:hover{background:var(--accent);color:#fff}
    .ac-drop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;box-shadow:var(--sm);z-index:200;max-height:190px;overflow-y:auto}
    .ac-item{padding:9px 13px;cursor:pointer;font-size:12.5px;transition:background .1s;border-bottom:1px solid var(--border)}
    .ac-item:last-child{border-bottom:none}
    .ac-item:hover,.ac-item.sel{background:var(--accent-bg)}
    .ac-name{font-weight:600;color:var(--t1)}
    .ac-sub{font-size:11px;color:var(--t3);margin-top:1px}
    .ac-empty{padding:12px 13px;font-size:12px;color:var(--t3);text-align:center}
    .ac-new{padding:9px 13px;cursor:pointer;font-size:12px;color:var(--accent);font-weight:600;display:flex;align-items:center;gap:6px;border-top:1px solid var(--border)}
    .ac-new:hover{background:var(--accent-bg)}

    /* ── EOD ── */
    .eod-ov{position:fixed;inset:0;background:rgba(15,22,35,.5);z-index:160;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
    .eod-box{background:var(--surface);border-radius:20px;padding:24px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;box-shadow:var(--sl)}
    .eod-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
    .eod-row:last-child{border-bottom:none}
    .eod-cb{width:20px;height:20px;border-radius:6px;border:2px solid var(--border2);background:var(--surface);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s,border-color .12s;margin-top:2px}
    .eod-cb.on{background:var(--green);border-color:var(--green)}
    .eod-cb svg{display:none}
    .eod-cb.on svg{display:block}

    /* ── Entity card ── */
    .entity-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;box-shadow:var(--sh);transition:box-shadow .15s,transform .15s}
    .entity-card:hover{box-shadow:var(--sm);transform:translateY(-1px)}

    /* ── Plan card ── */
    .plan-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;display:flex;align-items:flex-start;gap:10px;transition:box-shadow .12s}
    .plan-card:hover{box-shadow:var(--sm)}

    /* ── Ledger transaction row ── */
    .tx-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
    .tx-row:last-child{border-bottom:none}
    .tx-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

    /* ── Account card (Kasa) ── */
    .acct-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px 20px;box-shadow:var(--sh);transition:box-shadow .15s,transform .15s;cursor:pointer}
    .acct-card:hover{box-shadow:var(--sm);transform:translateY(-1px)}
    .acct-type-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase}

    /* ── KV ── */
    .kv-row{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}
    .kv-row:last-child{border-bottom:none}
    .kv-key{font-size:10.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--t3);width:130px;flex-shrink:0;padding-top:1px}
    .kv-val{font-size:13px;color:var(--t1);font-weight:500;word-break:break-word}

    /* ── Balance pill ── */
    .bal-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-family:'DM Mono',monospace;font-size:12px;font-weight:600}

    /* ── Setup ── */
    .setup-wrap{max-width:540px;margin:60px auto;padding:0 24px}

    /* ── Mob ── */
    .mob-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:55}
    .hamburger{display:none;background:none;border:none;cursor:pointer;padding:6px;border-radius:8px;color:var(--t2)}

    /* ── Empty ── */
    .empty{text-align:center;padding:40px 20px;color:var(--t3)}
    .em-ic{font-size:32px;margin-bottom:10px}
    .em-title{font-size:13.5px;font-weight:600;color:var(--t2);margin-bottom:3px}
    .em-sub{font-size:12px}

    /* ── Responsive ── */
    @media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr)}.g23{grid-template-columns:1fr}}
    @media(max-width:768px){
      .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0);box-shadow:var(--sl)}
      .mob-ov.open{display:block}.hamburger{display:flex}.main-wrap{margin-left:0}
      .topbar{padding:0 14px}.page{padding:14px 12px}
      .g4,.g3{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}
      .hide-mob{display:none!important}th.hide-mob,td.hide-mob{display:none}
      /* Dokunma hedefleri min 44px */
      .btn{min-height:40px}
      .btn-primary,.btn-sec{min-height:44px;font-size:14px}
      .nav-item{min-height:44px}
      .field{min-height:44px;font-size:16px!important}
      /* Tablo yatay kaydır */
      .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:12px}
      .tbl-wrap table{min-width:480px}
      .sec-hd{flex-wrap:wrap;gap:8px}
    }
    @media(max-width:480px){
      .g4,.g3{grid-template-columns:1fr}
      .stat-card{padding:12px 14px}
    }
    /* Haftalık şerit — yatay kaydır */
    .week-grid{display:grid;grid-template-columns:repeat(7,minmax(130px,1fr));gap:6px;overflow-x:auto;padding-bottom:4px}
    /* ── Login ── */
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--sb-bg);padding:20px}
    .login-box{width:100%;max-width:400px}
    .login-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:32px 28px}
    .login-field{background:rgba(255,255,255,.08)!important;border:1.5px solid rgba(255,255,255,.12)!important;color:#fff!important}
    .login-field::placeholder{color:rgba(255,255,255,.3)!important}
    .login-field:focus{border-color:rgba(99,102,241,.6)!important;background:rgba(255,255,255,.1)!important}
    .login-lbl{font-size:11px;font-weight:600;color:rgba(255,255,255,.45);letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:6px}

    /* ── User Mgmt ── */
    .perm-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
    .perm-item{display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:9px;cursor:pointer;user-select:none;transition:all .12s;border:1.5px solid var(--border);background:var(--bg);font-size:12.5px;font-weight:500}
    .perm-item.on{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
    .perm-cb{width:16px;height:16px;border-radius:4px;border:2px solid currentColor;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .12s}
    .perm-item.on .perm-cb{background:var(--accent);border-color:var(--accent)}

    /* ── User list avatar ── */
    .u-avatar{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
    /* ══════════════════════════════════════
       LANDING PAGE — Modern Endüstriyel Tema
    ══════════════════════════════════════ */
    .lp{min-height:100vh;background:#060E1F;color:#fff;font-family:'Inter',sans-serif;overflow-x:hidden}

    /* NAV */
    .lp-nav{
      position:sticky;top:0;z-index:100;

<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.25.6/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
<script type="text/babel">
const {useState,useMemo,useEffect,useRef,useCallback}=React;

/* ─── CONSTANTS ─── */
const MONTHS=["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
const CRANE_COLORS=["#1B4FD8","#059669","#D97706","#7C3AED","#DC2626","#0891B2"];
const ACCT_TYPES={bank:{label:"Banka (TL)",icon:"🏦",color:"#1B4FD8",bg:"#EEF3FF"},fx:{label:"Döviz",icon:"💱",color:"#0891B2",bg:"#ECFEFF"},cash:{label:"Nakit Kasa",icon:"💵",color:"#059669",bg:"#ECFDF5"},pos:{label:"Kredi POS",icon:"💳",color:"#7C3AED",bg:"#F5F3FF"}};
const CURRENCIES=["TL","USD","EUR","GBP"];

/* ══════════════════════════════════════════════════════
   KURULUM — Supabase bilgilerinizi buraya girin
   supabase.com → Projeniz → Settings → API →
   "Project URL" ve "anon public" key
══════════════════════════════════════════════════════ */
/* ── Supabase bağlantısı ──
   Önce localStorage'dan okur (Setup ekranından girilmişse),
   yoksa aşağıdaki sabit değerleri kullanır.                */
const SB_URL  = localStorage.getItem("sb_url")  || "https://druyogpaakdazgepqznv.supabase.co";
const SB_ANON = localStorage.getItem("sb_anon") || "sb_publishable_Mj0yvJaooKtnfSIV4yQUWw_WI2nXwnT";

let sb = null;
let SB_INIT_ERROR = null;

if(SB_URL && SB_ANON){
  try{
    sb = window.supabase.createClient(SB_URL.trim(), SB_ANON.trim(), {
      auth:{
        persistSession    : true,
        autoRefreshToken  : true,
        storageKey        : "vintek360_session",
        detectSessionInUrl: true,
      }
    });
  }catch(e){
    SB_INIT_ERROR = "Supabase başlatılamadı: " + e.message;
    sb = null;
  }
}

/* ─── DB helpers — STRICT company_id izolasyonu ─── */
async function sbF(t, companyId){
  if(!sb) return null;
  /* GÜVENLİK: company_id olmadan kesinlikle veri çekme */
  if(!companyId){
    console.warn("[sbF] company_id eksik, sorgu engellendi:", t);
    return [];  // null değil [] — boş array dön, hata değil
  }
  try{
    const{data,error}=await sb.from(t).select("*").eq("company_id",companyId);
    if(error){ console.error("[sbF]",t,error.code,error.message); return null; }
    return data||[];
  }catch(e){
    console.error("[sbF] exception:",t,e.message);
    return null;
  }
}
async function sbU(t, rows, companyId){
  if(!sb) return;
  if(!companyId){
    console.warn("[sbU] company_id eksik, yazma engellendi:", t);
    return;
  }
  try{
    const stamped=rows.map(r=>({...r, company_id:companyId}));
    const{error}=await sb.from(t).upsert(stamped,{onConflict:"id"});
    if(error) console.error("[sbU]",t,error.code,error.message);
  }catch(e){
    console.error("[sbU] exception:",t,e.message);
  }
}
async function sbD(t, id){
  if(!sb) return;
  try{
    const{error}=await sb.from(t).delete().eq("id",id);
    if(error) console.error("[sbD]",t,error.code,error.message);
  }catch(e){
    console.error("[sbD] exception:",t,e.message);
  }
}

/* ─── Auth helpers ─── */
async function authSignIn(email,pass){
  const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
  return{data,error};
}
async function authSignOut(){ await sb.auth.signOut() }
async function authSignUp(email, pass, companyName){
  console.log("[VT signUp] Başlatılıyor — email:", email, "| company:", companyName);
  const{data,error}=await sb.auth.signUp({
    email,
    password: pass,
    options:{
      emailRedirectTo: window.location.origin,
      data:{ company_name: companyName || "" }  // trigger bu metadata'yı okur
    }
  });
  if(error) console.error("[VT signUp] Auth hatası:", error.code, error.message, error);
  else       console.log("[VT signUp] Başarılı — user.id:", data?.user?.id, "| identities:", data?.user?.identities?.length);
  return{data,error};
}
async function authCreateUser(email,pass){
  const{data,error}=await sb.auth.signUp({email,password:pass,options:{emailRedirectTo:window.location.origin}});
  return{data,error};
}
async function createCompanyAndProfile(userId,companyName,email){
  if(!sb)return{error:"Supabase bağlı değil"};
  // Şirket oluştur
  const{data:co,error:ce}=await sb.from("companies").insert({name:companyName}).select().single();
  if(ce)return{error:ce.message};
  // Profil güncelle
  const{error:pe}=await sb.from("profiles").upsert({
    id:userId, display_name:email.split("@")[0],
    role:"admin", permissions:{...ADMIN_PERMS},
    company_id:co.id, company_name:companyName
  },{onConflict:"id"});
  if(pe)return{error:pe.message};
  return{company:co};
}
async function getAllProfiles(){
  if(!sb)return[];
  const{data}=await sb.from("profiles").select("id,display_name,role,permissions");
  return data||[];
}
async function upsertProfile(prof){ if(!sb)return; await sb.from("profiles").upsert(prof,{onConflict:"id"}) }

/* ─── Permission defs ─── */
const PERM_DEFS=[
  /* — Modül izinleri — */
  {k:"operations",      l:"Operasyon",         ic:"🚛", desc:"Satışlar, Filo ve günlük iş takibi"},
  {k:"accounting",      l:"Muhasebe",          ic:"💰", desc:"Kasa, banka ve alışlar"},
  {k:"crm",             l:"Cari Yönetim",      ic:"🏢", desc:"Müşteri ve tedarikçi cari hesapları"},
  {k:"reporting",       l:"Raporlama",         ic:"📊", desc:"Günlük & aylık raporlar"},
  {k:"fleet_view",      l:"Filo Görünümü",     ic:"🔧", desc:"Araç listesi ve detayları"},
  {k:"job_delete",      l:"Kayıt Silme",       ic:"🗑", desc:"Satış ve kayıt silme yetkisi"},
];
const DEFAULT_PERMS=Object.fromEntries(PERM_DEFS.map(p=>[p.k,false]));
const ADMIN_PERMS  =Object.fromEntries(PERM_DEFS.map(p=>[p.k,true]));

/* Nav key → required permission */
const NAV_PERM={
  home      : null,
  cash      : "accounting",
  jobs      : "operations",
  purchases : "accounting",
  customers : "crm",
  suppliers : "crm",
  cranes    : "fleet_view",
  report    : "reporting",
  users     : null,   /* admin kontrolü ayrıca */
  staff     : null,   /* admin kontrolü ayrıca */
};

/* ─── Hata mesajları Türkçe ─── */
function turkishAuthError(msg=""){
  if(msg.includes("Invalid login credentials"))  return "E-posta veya şifre hatalı.";
  if(msg.includes("Email not confirmed"))         return "E-posta adresi henüz onaylanmamış.";
  if(msg.includes("User already registered"))     return "Bu e-posta adresi zaten kayıtlı.";
  if(msg.includes("Password should be"))          return "Şifre en az 6 karakter olmalıdır.";
  if(msg.includes("Unable to validate"))          return "Oturum doğrulanamadı. Tekrar giriş yapın.";
  if(msg.includes("rate limit"))                  return "Çok fazla deneme. Lütfen bekleyin.";
  return msg||"Bilinmeyen hata oluştu.";
}


/* ─── UTILS ─── */
/* ─── TARIH ─── */
/* today(): UTC değil, yerel (Türkiye UTC+3) saate göre */
function today(){
  const d=new Date();
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,"0");
  const day=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
/* Tarihten yerel Date objesi — saat farkı kayması olmadan */
function localDate(dateStr){
  if(!dateStr)return new Date();
  const[y,m,d]=dateStr.split("-").map(Number);
  return new Date(y,m-1,d);
}
function getMY(d){const[y,m]=d.split("-");return{year:parseInt(y),month:parseInt(m)}}
function fmtDate(d){if(!d)return"";const[y,m,dd]=d.split("-");return`${dd}.${m}.${y}`}
function fmtPrice(n,cur="TL"){
  if(n==null||n==="")return"—";
  const fmt=Number(n).toLocaleString("tr-TR",{minimumFractionDigits:2,maximumFractionDigits:2});
  return cur==="TL"?fmt+" ₺":fmt+" "+cur;
}
function loadLS(k,fb){try{const r=localStorage.getItem(k);return r?JSON.parse(r):fb}catch{return fb}}
function saveLS(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function parseCents(v){return parseInt((v||"").replace(/\D/g,"")||"0",10)}
function fmtCents(c){if(!c)return"";const s=String(c).padStart(3,"0");return s.slice(0,-2).replace(/\B(?=(\d{3})+(?!\d))/g,".")+","+s.slice(-2)}
function toNum(v){if(!v)return null;return parseCents(v)/100}
function initials(n){return(n||"").split(/\s+/).slice(0,2).map(w=>w[0]||"").join("").toUpperCase()||"?"}

/* ─── INIT DATA ─── */
/* Demo veri kaldırıldı — boş başlangıç */
/* ─── HELPERS ─── */
function entityBalance(ledger,entityType,entityId){
  // For customers: debt = they owe us; credit = they paid us
  // For suppliers: debt = we owe them; credit = we paid them
  return ledger.filter(l=>l.entityType===entityType&&l.entityId===entityId)
    .reduce((a,l)=>l.type==="debt"?a+l.amount:a-l.amount,0);
}
function accountBalance(cashTxs,accountId){
  return cashTxs.filter(t=>t.accountId===accountId)
    .reduce((a,t)=>t.type==="in"?a+t.amount:a-t.amount,0);
}

/* ─── TAŞERON HELPERS ─── */
function isSubcontractor(code){return code&&code.startsWith("TAŞERON:")}
function subcontractorTonnage(code){return code?code.replace("TAŞERON:",""):""}
function makeSubCode(tonnage){return "TAŞERON:"+(tonnage||"").trim()}

/* ─── CRANE CHIP ─── */
function CraneChip({code,cranes,color,plain}){
  // Taşeron mu?
  if(isSubcontractor(code)){
    const tonnage=subcontractorTonnage(code);
    const label=tonnage||"Taşeron";
    if(plain)return<span style={{fontWeight:700,color:"var(--amber)",cursor:"default"}}>{label}</span>;
    return<span className="chip" style={{background:"var(--amber-bg)",color:"var(--amber)",cursor:"default"}}>{label}</span>;
  }
  const [show,setShow]=useState(false);const [pos,setPos]=useState({top:0,left:0});
  const crane=cranes.find(c=>c.code===code);const ref=useRef(null);
  const calc=()=>{if(!ref.current)return;const r=ref.current.getBoundingClientRect();const tw=170,th=90;let l=r.left+r.width/2-tw/2,t=r.top-th-10;if(l<8)l=8;if(l+tw>window.innerWidth-8)l=window.innerWidth-tw-8;if(t<8)t=r.bottom+10;setPos({top:t,left:l})};
  useEffect(()=>{if(show){const id=setTimeout(()=>setShow(false),3000);return()=>clearTimeout(id)}},[show]);
  return(<span ref={ref} className="tip-wrap" onMouseEnter={()=>{calc();setShow(true)}} onMouseLeave={()=>setShow(false)} onTouchStart={e=>{e.stopPropagation();calc();setShow(v=>!v)}}>
    {plain?<span style={{fontWeight:700,color:"var(--t1)",cursor:"default"}}>{code}</span>:<span className="chip" style={{background:color?color+"18":"var(--accent-bg)",color:color||"var(--accent)",cursor:"default"}}>{code}</span>}
    {show&&crane&&(<div className="tip-box" style={{top:pos.top,left:pos.left}}>

/* ─── CUSTOMER AUTOCOMPLETE ─── */
function CustomerAC({value,onChange,customers,onAddNew}){
  const [q,setQ]=useState("");const [open,setOpen]=useState(false);const [focused,setFocused]=useState(false);
  const wrapRef=useRef(null);const selected=customers.find(c=>c.id===value);
  const filtered=useMemo(()=>{const s=q.trim().toLowerCase();if(!s)return customers.slice(0,8);return customers.filter(c=>c.title.toLowerCase().includes(s)||(c.code||"").toLowerCase().includes(s)||(c.contact||"").toLowerCase().includes(s)).slice(0,8)},[q,customers]);
  useEffect(()=>{function h(e){if(wrapRef.current&&!wrapRef.current.contains(e.target))setOpen(false)}document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h)},[]);
  const select=c=>{onChange(c.id);setQ("");setOpen(false)};const clear=()=>{onChange(null);setQ("");setOpen(false)};
  if(selected&&!focused){return(<div style={{display:"flex",gap:0}}>
    <div style={{flex:1,background:"var(--surface)",border:"1.5px solid var(--border)",borderRadius:"9px 0 0 9px",padding:"9px 12px",fontSize:13.5,color:"var(--t1)",fontWeight:600,display:"flex",alignItems:"center",gap:8}}>
      <span style={{width:22,height:22,borderRadius:6,background:"var(--accent-bg)",color:"var(--accent)",fontSize:10,fontWeight:800,display:"inline-flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{initials(selected.title)}</span>
      <span>{selected.title}</span>
      {selected.code&&<span style={{fontSize:11,color:"var(--t3)",fontWeight:400}}>{selected.code}</span>}
    </div>
    <button type="button" onClick={clear} style={{borderRadius:"0 9px 9px 0",border:"1.5px solid var(--border)",borderLeft:"none",background:"var(--bg)",color:"var(--t3)",cursor:"pointer",padding:"0 12px",fontSize:16,transition:"color .12s"}} onMouseOver={e=>e.currentTarget.style.color="var(--red)"} onMouseOut={e=>e.currentTarget.style.color="var(--t3)"}>✕</button>
  </div>);}
  return(<div className="ac-wrap" ref={wrapRef}>
    <div className="ac-row">
      <input className="field ac-inp" placeholder="Müşteri ara veya seç..." value={q} onChange={e=>{setQ(e.target.value);setOpen(true)}} onFocus={()=>{setOpen(true);setFocused(true)}} onBlur={()=>setTimeout(()=>setFocused(false),200)} autoComplete="off"/>
      <button type="button" className="ac-add" onClick={onAddNew}>+ Yeni</button>
    </div>
    {open&&(<div className="ac-drop">
      {filtered.length===0&&<div className="ac-empty">Müşteri bulunamadı</div>}
      {filtered.map(c=>(<div key={c.id} className="ac-item" onMouseDown={()=>select(c)}><div className="ac-name">{c.title}</div>{(c.code||c.contact)&&<div className="ac-sub">{[c.code,c.contact].filter(Boolean).join(" · ")}</div>}</div>))}
      <div className="ac-new" onMouseDown={onAddNew}><span>+</span> Yeni müşteri ekle</div>
    </div>)}
  </div>);
}

/* ─── PRICE INPUT HOOK ─── */
function usePriceInput(init=""){
  const [dsp,setDsp]=useState(init);
  const kd=e=>{if(e.key==="Backspace"){const c=parseCents(dsp);const n=Math.floor(c/10);setDsp(n>0?fmtCents(n):"");e.preventDefault()}};
  const inp=e=>{const ch=e.nativeEvent.data;if(!ch||!/^\d$/.test(ch))return;const c=parseCents(dsp);const n=c*10+parseInt(ch,10);if(n>9999999999)return;setDsp(fmtCents(n));e.preventDefault()};
  const reset=()=>setDsp("");
  const set=v=>setDsp(v!=null?fmtCents(Math.round(v*100)):"");
  return{dsp,setDsp,kd,inp,reset,set,num:toNum(dsp)};
}

/* ══════════════════════════════════════

function SignupScreen({onDone,onBack}){
  const [step,setStep]=useState(1); // 1=email/pass, 2=firma adı, 3=e-posta onayı bekleniyor
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [pass2,setPass2]=useState("");
  const [company,setCompany]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");

  const doSignup=async()=>{
    if(!email.trim()||!pass){setErr("E-posta ve şifre zorunludur.");return}
    if(pass.length<8){setErr("Şifre en az 8 karakter olmalıdır.");return}
    if(!/[A-Z]/.test(pass)){setErr("Şifre en az bir büyük harf içermelidir.");return}
    if(!/[0-9]/.test(pass)){setErr("Şifre en az bir rakam içermelidir.");return}
    if(pass!==pass2){setErr("Şifreler eşleşmiyor.");return}
    setErr("");
    setStep(2); // Önce firma adını al
  };

  const doCompany=async()=>{
    if(!company.trim()){setErr("Firma adı zorunludur.");return}
    setLoading(true);setErr("");

    /* ADIM 1: signUp — company_name metadata içinde gönder */
    const{data,error}=await authSignUp(email.trim(), pass, company.trim());

    if(error){
      console.error("[VT doCompany] Detaylı Hata:", error);
      setLoading(false);
      setErr(turkishAuthError(error.message));
      return;
    }

    const user=data?.user;
    if(!user){
      console.error("[VT doCompany] signUp başarılı ama user objesi null. data:", data);
      setLoading(false);
      setErr("Kullanıcı oluşturuldu ancak oturum açılamadı. Lütfen giriş yapın.");
      return;
    }

    /* ADIM 2: Fail-safe — trigger gecikmiş/çalışmamış olabilir.
       Direkt INSERT dene; CONFLICT durumunda UPDATE yap */
    try{
      const{error:pe}=await sb.from("profiles").upsert({
        id            : user.id,
        display_name  : company.trim(),
        role          : "admin",
        permissions   : {...ADMIN_PERMS},
        company_name  : company.trim()
      },{onConflict:"id",ignoreDuplicates:false});

      if(pe){
        console.warn("[VT doCompany] Profil upsert uyarısı (kritik değil):", pe.code, pe.message);
        /* Trigger zaten çalışmış ve satır oluşturmuş olabilir — devam et */
      } else {
        console.log("[VT doCompany] Profil başarıyla kaydedildi — company:", company.trim());
      }
    }catch(profileErr){
      console.error("[VT doCompany] Profil kaydı exception:", profileErr);
      /* Kritik değil — trigger çalışmış olabilir, devam et */
    }

    /* ADIM 3: Supabase email confirm aktifse kullanıcıya bildir */
    const needsConfirm = data?.user?.identities?.length===0 || !data?.user?.confirmed_at;
    if(needsConfirm){
      setLoading(false);
      /* Profil yine de kaydedildi — kullanıcı e-posta onayı sonrası giriş yapabilir */
      setStep(3); // yeni adım: onay bekleniyor
      return;
    }

    /* Direkt Dashboard'a yönlendir */
    setLoading(false);
    onDone(user);
  };

  return(
    <div className="login-wrap">
      <div className="login-box">
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{width:50,height:50,background:"linear-gradient(140deg,#3B82F6,#1B4FD8)",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",boxShadow:"0 6px 20px rgba(59,130,246,.4)"}}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800,color:"#fff",marginBottom:4}}>
            {step===1?"Hesap Oluştur":step===2?"Firma Bilgisi":"E-posta Onayı"}
          </div>
          <div style={{fontSize:12,color:"rgba(255,255,255,.35)"}}>
            {step===1?"Ücretsiz başlayın, dakikalar içinde hazır":step===2?"Firmanızın adını girin":"Neredeyse tamamlandı"}
          </div>
          {/* Step indicator */}
          <div style={{display:"flex",alignItems:"center",gap:6,justifyContent:"center",marginTop:14}}>
            {[1,2,3].map(s=>(
              <div key={s} style={{height:4,width:s===step?24:12,borderRadius:4,background:s<=step?"#3B82F6":"rgba(255,255,255,.15)",transition:"all .2s"}}/>
            ))}
          </div>
        </div>

        <div className="login-card">
          {err&&<div style={{background:"rgba(220,38,38,.15)",border:"1px solid rgba(220,38,38,.35)",borderRadius:9,padding:"10px 13px",fontSize:12.5,color:"#FCA5A5",marginBottom:16,lineHeight:1.5}}>{err}</div>}

          {step===1?(
            <>
              <div style={{marginBottom:12}}>
                <label className="login-lbl">E-posta</label>
                <input className="field login-field" type="email" placeholder="ornek@firma.com" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doSignup()}/>
              </div>
              <div style={{marginBottom:12}}>
                <label className="login-lbl">Şifre</label>
                <input className="field login-field" type="password" placeholder="Min. 8 karakter" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doSignup()}/>
                <div style={{display:"flex",gap:8,marginTop:6,flexWrap:"wrap"}}>
                  {[
                    {ok:pass.length>=8,  label:"8+ karakter"},
                    {ok:/[A-Z]/.test(pass),label:"Büyük harf"},
                    {ok:/[0-9]/.test(pass),label:"Rakam"},
                  ].map(r=>(
                    <span key={r.label} style={{fontSize:10.5,display:"flex",alignItems:"center",gap:4,color:r.ok?"#6EE7B7":"rgba(255,255,255,.25)"}}>
                      <svg width="10" height="10" viewBox="0 0 12 12" fill="none">
                        {r.ok
                          ?<polyline points="1.5,6 4.5,9 10.5,3" stroke="#6EE7B7" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                          :<circle cx="6" cy="6" r="4.5" stroke="rgba(255,255,255,.25)" strokeWidth="1.5"/>
                        }
                      </svg>
                      {r.label}
                    </span>
                  ))}
                </div>
              </div>
              <div style={{marginBottom:22}}>
                <label className="login-lbl">Şifre Tekrar</label>
                <input className="field login-field" type="password" placeholder="Şifreyi tekrar girin" value={pass2} onChange={e=>setPass2(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doSignup()}/>
              </div>
              <button className="btn btn-primary btn-full" onClick={doSignup} disabled={loading} style={{fontSize:14,padding:"13px",justifyContent:"center",opacity:loading?.65:1}}>
                {loading?"Hesap oluşturuluyor…":"Devam Et →"}
              </button>
              <button onClick={onBack} style={{width:"100%",marginTop:12,background:"none",border:"none",fontSize:12,color:"rgba(255,255,255,.35)",cursor:"pointer",padding:8}}>
                ← Geri dön
              </button>
            </>
          ):step===2?(
            <>
              <div style={{marginBottom:22}}>
                <label className="login-lbl">Firma / Şirket Adı</label>
                <input className="field login-field" placeholder="Örn: Kardeşler Vinç Ltd. Şti." value={company} onChange={e=>setCompany(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doCompany()} autoFocus/>
                <div style={{fontSize:11,color:"rgba(255,255,255,.3)",marginTop:6,lineHeight:1.5}}>Bu isim uygulamada görünecek ve verilerinizi tanımlayacak.</div>
              </div>
              <button className="btn btn-primary btn-full" onClick={doCompany} disabled={loading} style={{fontSize:14,padding:"13px",justifyContent:"center",opacity:loading?.65:1}}>
                {loading?"Kaydediliyor…":"🚀 Uygulamaya Başla"}
              </button>
            </>
          ):(
            /* Adım 3: E-posta onayı bekleniyor */
            <div style={{textAlign:"center",padding:"10px 0"}}>
              <div style={{fontSize:40,marginBottom:16}}>📧</div>
              <div style={{fontSize:16,fontWeight:700,color:"#fff",marginBottom:10}}>E-postanızı Onaylayın</div>
              <div style={{fontSize:13,color:"rgba(255,255,255,.5)",lineHeight:1.7,marginBottom:20}}>
                <b style={{color:"#93C5FD"}}>{email}</b> adresine bir onay bağlantısı gönderdik.<br/>
                Lütfen gelen kutunuzu kontrol edin ve bağlantıya tıklayın.
              </div>
              <div style={{background:"rgba(99,102,241,.1)",border:"1px solid rgba(99,102,241,.25)",borderRadius:10,padding:"12px 14px",fontSize:12,color:"rgba(255,255,255,.45)",marginBottom:20,lineHeight:1.6}}>
                ℹ Spam klasörünü de kontrol etmeyi unutmayın.
              </div>
              <button className="btn btn-primary btn-full" onClick={onLogin} style={{fontSize:14,padding:"13px",justifyContent:"center"}}>
                Onayladım, Giriş Yap →
              </button>
            </div>
          )}
        </div>
        <div style={{textAlign:"center",marginTop:18,fontSize:11,color:"rgba(255,255,255,.18)"}}>Vintek360 — Verileriniz güvendedir</div>
      </div>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );
}

/* ══════════════════════════════════════
   LOGIN EKRANI
══════════════════════════════════════ */
function LoginScreen({onLogin,onBack,onSignup}){
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const [showReset,setShowReset]=useState(false);
  const [resetSent,setResetSent]=useState(false);
  const [showPass,setShowPass]=useState(false);

  const doLogin=async()=>{
    if(!email.trim()||!pass){setErr("E-posta ve şifre zorunludur.");return}
    setLoading(true);setErr("");
    const{data,error}=await authSignIn(email.trim(),pass);
    setLoading(false);
    if(error){setErr(turkishAuthError(error.message));return}
    onLogin(data.user);
  };

  const doReset=async()=>{
    if(!email.trim()){setErr("Sıfırlama için e-posta adresinizi girin.");return}
    setLoading(true);setErr("");
    const{error}=await sb.auth.resetPasswordForEmail(email.trim(),{redirectTo:window.location.origin});
    setLoading(false);
    if(error){setErr(turkishAuthError(error.message));return}
    setResetSent(true);
  };

  return(
    <div className="login-wrap">
      <div className="login-box">
        {/* Logo */}
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:56,height:56,background:"linear-gradient(140deg,#2563EB,#1B4FD8)",borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",boxShadow:"0 8px 28px rgba(37,99,235,.45)"}}>
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
              <rect x="2" y="14" width="14" height="6" rx="2" fill="white" opacity=".9"/>
              <rect x="16" y="16" width="6" height="4" rx="1" fill="white" opacity=".65"/>
              <rect x="4" y="10" width="2" height="4" fill="white" opacity=".8"/>
              <rect x="3" y="8" width="10" height="2" rx="1" fill="white"/>
              <circle cx="6" cy="21" r="2" fill="white"/>
              <circle cx="13" cy="21" r="2" fill="white"/>
              <circle cx="19" cy="21" r="1.5" fill="white" opacity=".75"/>
            </svg>
          </div>
          <div style={{display:"flex",alignItems:"baseline",gap:1,justifyContent:"center",lineHeight:1}}>
            <span style={{fontFamily:"'Syne',sans-serif",fontSize:26,fontWeight:800,color:"#3B82F6",letterSpacing:"-1.2px"}}>Vintek</span>
            <span style={{fontFamily:"'Syne',sans-serif",fontSize:26,fontWeight:700,color:"transparent",WebkitTextStroke:"2px #3B82F6",letterSpacing:"-1.2px"}}>360</span>
          </div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.3)",letterSpacing:"1.5px",textTransform:"uppercase",marginTop:5}}>Operasyon Takip Sistemi</div>
        </div>

        <div className="login-card">
          {!showReset?(
            <>
              <div style={{fontSize:17,fontWeight:700,color:"#fff",marginBottom:22}}>Giriş Yap</div>
              {err&&<div style={{background:"rgba(220,38,38,.15)",border:"1px solid rgba(220,38,38,.35)",borderRadius:9,padding:"10px 13px",fontSize:12.5,color:"#FCA5A5",marginBottom:16,lineHeight:1.5}}>{err}</div>}
              <div style={{marginBottom:13}}>
                <label className="login-lbl">E-posta</label>
                <input className="field login-field" type="email" placeholder="ornek@firma.com" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()}/>
              </div>
              <div style={{marginBottom:22}}>
                <label className="login-lbl">Şifre</label>
                <div style={{position:"relative"}}>
                  <input className="field login-field" type={showPass?"text":"password"} placeholder="••••••••" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doLogin()} style={{paddingRight:44}}/>
                  <button onClick={()=>setShowPass(v=>!v)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"rgba(255,255,255,.4)",cursor:"pointer",fontSize:15,padding:4}}>
                    {showPass?"🙈":"👁"}
                  </button>
                </div>
              </div>
              <button className="btn btn-primary btn-full" onClick={doLogin} disabled={loading}
                style={{fontSize:14,padding:"13px",justifyContent:"center",opacity:loading?.65:1,transition:"opacity .15s"}}>
                {loading?<>
                  <span style={{display:"inline-block",width:14,height:14,border:"2px solid rgba(255,255,255,.3)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin .7s linear infinite",marginRight:8}}/>
                  Giriş yapılıyor…
                </>:"Giriş Yap"}
              </button>
              <button onClick={()=>{setShowReset(true);setErr("");}} style={{width:"100%",marginTop:14,background:"none",border:"none",fontSize:12,color:"rgba(255,255,255,.35)",cursor:"pointer",padding:8,transition:"color .12s"}} onMouseOver={e=>e.currentTarget.style.color="rgba(255,255,255,.65)"} onMouseOut={e=>e.currentTarget.style.color="rgba(255,255,255,.35)"}>
                Şifremi unuttum
              </button>
            </>
          ):(
            <>
              <button onClick={()=>{setShowReset(false);setErr("");setResetSent(false);}} style={{background:"none",border:"none",color:"rgba(255,255,255,.45)",cursor:"pointer",fontSize:12,marginBottom:18,padding:0,display:"flex",alignItems:"center",gap:5}}>← Geri dön</button>
              <div style={{fontSize:17,fontWeight:700,color:"#fff",marginBottom:8}}>Şifre Sıfırla</div>
              {resetSent?(
                <div style={{background:"rgba(5,150,105,.15)",border:"1px solid rgba(5,150,105,.3)",borderRadius:9,padding:"16px",fontSize:13,color:"#6EE7B7",lineHeight:1.7}}>
                  ✓ Sıfırlama bağlantısı <b>{email}</b> adresine gönderildi.<br/>
                  <span style={{fontSize:11,color:"rgba(110,231,183,.7)"}}>Gelen kutunuzu (ve spam klasörünü) kontrol edin.</span>
                </div>
              ):(
                <>
                  {err&&<div style={{background:"rgba(220,38,38,.15)",border:"1px solid rgba(220,38,38,.35)",borderRadius:9,padding:"10px 13px",fontSize:12.5,color:"#FCA5A5",marginBottom:16}}>{err}</div>}
                  <div style={{marginBottom:18}}>
                    <label className="login-lbl">E-posta</label>
                    <input className="field login-field" type="email" placeholder="ornek@firma.com" value={email} onChange={e=>setEmail(e.target.value)}/>
                  </div>
                  <button className="btn btn-primary btn-full" onClick={doReset} disabled={loading}
                    style={{fontSize:14,padding:"13px",justifyContent:"center",opacity:loading?.65:1}}>
                    {loading?"Gönderiliyor…":"Sıfırlama E-postası Gönder"}
                  </button>
                </>
              )}
            </>
          )}
        </div>
        <div style={{textAlign:"center",marginTop:16,display:"flex",flexDirection:"column",gap:8}}>
          {onSignup&&<button onClick={onSignup} style={{background:"none",border:"none",fontSize:12.5,color:"#60A5FA",cursor:"pointer",padding:6}}>Hesabınız yok mu? <b>Ücretsiz kayıt olun →</b></button>}
          {onBack&&<button onClick={onBack} style={{background:"none",border:"none",fontSize:11,color:"rgba(255,255,255,.25)",cursor:"pointer",padding:4}}>← Ana sayfaya dön</button>}
        </div>
      </div>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );
}

/* ══════════════════════════════════════
   KULLANICI YÖNETİMİ SAYFASI (Admin only)
══════════════════════════════════════ */
function UserMgmtPage({currentProfile,showT}){
  const [users,setUsers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [editUser,setEditUser]=useState(null);   // profil objesi
  const [editPerms,setEditPerms]=useState({});
  const [editRole,setEditRole]=useState("personel");
  const [editName,setEditName]=useState("");
  const [showAdd,setShowAdd]=useState(false);
  const [newEmail,setNewEmail]=useState("");
  const [newPass,setNewPass]=useState("");
  const [newRole,setNewRole]=useState("personel");
  const [newPerms,setNewPerms]=useState({...DEFAULT_PERMS});
  const [newName,setNewName]=useState("");
  const [saving,setSaving]=useState(false);

  const load=async()=>{
    setLoading(true);
    const list=await getAllProfiles();
    setUsers(list);setLoading(false);
  };
  useEffect(()=>{load();},[]);

  const openEdit=u=>{
    setEditUser(u);
    setEditRole(u.role||"personel");
    setEditPerms({...DEFAULT_PERMS,...(u.permissions||{})});
    setEditName(u.display_name||"");
  };

  const saveEdit=async()=>{
    if(!editUser)return;
    setSaving(true);
    /* email sütunu profiles tablosunda YOK — sadece id, display_name, role, permissions */
    const updated={id:editUser.id, display_name:editName, role:editRole, permissions:editRole==="admin"?ADMIN_PERMS:editPerms};
    await upsertProfile(updated);
    setSaving(false);showT("✓ Kullanıcı güncellendi");
    setEditUser(null);load();
  };

  const addUser=async()=>{
    if(!newEmail.trim()){showT("⚠ E-posta zorunlu");return}
    if(newPass.length<6){showT("⚠ Şifre en az 6 karakter olmalı");return}
    setSaving(true);
    const{data,error}=await authCreateUser(newEmail.trim(),newPass);
    if(error){showT("⚠ "+turkishAuthError(error.message));setSaving(false);return}
    const uid=data.user?.id;
    if(uid){
      const perms=newRole==="admin"?ADMIN_PERMS:newPerms;
      /* email sütunu yok — display_name olarak isim veya e-posta ilk kısmını kullan */
      await upsertProfile({id:uid, display_name:newName||newEmail.split("@")[0], role:newRole, permissions:perms});
    }
    setSaving(false);showT("✓ Kullanıcı oluşturuldu — giriş yapabilir");
    setShowAdd(false);setNewEmail("");setNewPass("");setNewName("");setNewRole("personel");setNewPerms({...DEFAULT_PERMS});
    load();
  };

  const togglePerm=(perms,setPerms,k)=>setPerms(p=>({...p,[k]:!p[k]}));

  const PermGrid=({perms,setPerms,disabled})=>(
    <div className="perm-grid">
      {PERM_DEFS.map(p=>(
        <label key={p.k} className={"perm-item"+(perms[p.k]?" on":"")} style={{opacity:disabled?.5:1,cursor:disabled?"not-allowed":"pointer"}}
          onClick={()=>!disabled&&togglePerm(perms,setPerms,p.k)}>
          <div className="perm-cb">
            {perms[p.k]&&<svg width="9" height="9" viewBox="0 0 9 9" fill="none"><polyline points="1,4.5 3.5,7 8,2" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
          </div>
          <span>{p.ic} {p.l}</span>
        </label>
      ))}
    </div>
  );

  if(!sb)return(
    <div className="page"><div className="card"><div className="empty"><div className="em-ic">🔌</div><div className="em-title">Supabase Bağlı Değil</div><div className="em-sub">Kullanıcı yönetimi için Supabase bağlantısı gereklidir.</div></div></div></div>
  );

  return(
    <div className="page">
      {/* Başlık */}
      <div className="sec-hd" style={{marginBottom:20}}>
        <div>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:16,fontWeight:800}}>Kullanıcı Yönetimi</div>
          <div style={{fontSize:12,color:"var(--t3)",marginTop:2}}>Şirket hesapları, roller ve izinler</div>
        </div>
        <button className="btn btn-primary" onClick={()=>setShowAdd(v=>!v)}>
          {showAdd?"✕ İptal":"+ Yeni Kullanıcı"}
        </button>
      </div>

      {/* Yeni kullanıcı formu */}
      {showAdd&&(
        <div className="card" style={{marginBottom:20,borderTop:"3px solid var(--accent)"}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:16}}>Yeni Kullanıcı Ekle</div>
          <div style={{background:"var(--amber-bg)",border:"1px solid var(--amber-lt)",borderRadius:9,padding:"10px 13px",fontSize:12,color:"#92400E",marginBottom:16,lineHeight:1.6}}>
            ⚠ Oluşturulan kullanıcı e-postasına onay maili gidebilir. Supabase Dashboard → Auth → Settings → "Confirm email" seçeneğini kapatırsanız direkt giriş yapabilir.
          </div>
          <div className="g2" style={{marginBottom:12}}>
            <div className="irow"><span className="lbl">E-posta *</span><input className="field" type="email" placeholder="personel@firma.com" value={newEmail} onChange={e=>setNewEmail(e.target.value)}/></div>
            <div className="irow"><span className="lbl">Şifre * (min 6 karakter)</span><input className="field" type="text" placeholder="Güvenli şifre" value={newPass} onChange={e=>setNewPass(e.target.value)}/></div>
          </div>
          <div className="g2" style={{marginBottom:16}}>
            <div className="irow"><span className="lbl">Ad Soyad</span><input className="field" placeholder="Ahmet Yılmaz" value={newName} onChange={e=>setNewName(e.target.value)}/></div>
            <div className="irow">
              <span className="lbl">Rol</span>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {["personel","admin"].map(r=>(
                  <button key={r} type="button" onClick={()=>setNewRole(r)}
                    style={{padding:"9px",borderRadius:9,border:`1.5px solid ${newRole===r?"var(--accent)":"var(--border)"}`,background:newRole===r?"var(--accent-bg)":"var(--bg)",color:newRole===r?"var(--accent)":"var(--t2)",fontWeight:600,fontSize:12,cursor:"pointer",transition:"all .12s"}}>
                    {r==="admin"?"👑 Admin":"👤 Personel"}
                  </button>
                ))}
              </div>
            </div>
          </div>
          {newRole!=="admin"&&(
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,fontWeight:700,color:"var(--t3)",letterSpacing:.5,textTransform:"uppercase",marginBottom:10}}>Erişim İzinleri</div>
              <PermGrid perms={newPerms} setPerms={setNewPerms} disabled={false}/>
            </div>
          )}
          {newRole==="admin"&&<div style={{background:"var(--accent-bg)",border:"1px solid #BFDBFE",borderRadius:9,padding:"10px 13px",fontSize:12,color:"var(--accent)",marginBottom:16}}>Admin rolü tüm izinlere otomatik sahip olur.</div>}
          <div style={{display:"flex",gap:9}}>
            <button className="btn btn-sec" onClick={()=>setShowAdd(false)}>İptal</button>
            <button className="btn btn-primary" onClick={addUser} disabled={saving}>{saving?"Oluşturuluyor…":"✓ Kullanıcı Oluştur"}</button>
          </div>
        </div>
      )}

      {/* Kullanıcı listesi */}
      {loading?(
        <div className="card"><div className="empty" style={{padding:30}}><div style={{color:"var(--t3)"}}>⏳ Yükleniyor…</div></div></div>
      ):(
        <div className="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th>Kullanıcı</th>
                <th>Rol</th>
                <th>İzinler</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {users.map(u=>{
                const isMe=u.id===currentProfile?.id;
                const perms=u.permissions||{};
                const permList=PERM_DEFS.filter(p=>perms[p.k]);
                const avatarBg=u.role==="admin"?"var(--accent-bg)":"var(--bg)";
                const avatarCol=u.role==="admin"?"var(--accent)":"var(--t2)";
                return(
                  <tr key={u.id}>
                    <td>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <div className="u-avatar" style={{background:avatarBg,color:avatarCol,border:"1.5px solid var(--border)"}}>
                          {initials(u.display_name||"?")}
                        </div>
                        <div>
                          <div style={{fontWeight:600,fontSize:13}}>{u.display_name||"İsimsiz Kullanıcı"} {isMe&&<span style={{fontSize:10,color:"var(--accent)",fontWeight:700,marginLeft:4}}>(Siz)</span>}</div>
                          <div style={{fontSize:11,color:"var(--t3)",marginTop:1,fontFamily:"monospace"}}>{u.id?.slice(0,18)}…</div>
                        </div>
                      </div>
                    </td>
                    <td>
                      <span className="chip" style={{background:u.role==="admin"?"var(--accent-bg)":"var(--bg)",color:u.role==="admin"?"var(--accent)":"var(--t2)",border:"1px solid var(--border)"}}>
                        {u.role==="admin"?"👑 Admin":"👤 Personel"}
                      </span>
                    </td>
                    <td>
                      {u.role==="admin"?(
                        <span style={{fontSize:11,color:"var(--t3)"}}>Tüm izinler</span>
                      ):(
                        <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                          {permList.length===0?(
                            <span style={{fontSize:11,color:"var(--t3)"}}>İzin yok</span>
                          ):permList.map(p=>(
                            <span key={p.k} className="chip" style={{background:"var(--green-bg)",color:"var(--green)",fontSize:10}}>{p.ic} {p.l}</span>
                          ))}
                        </div>
                      )}
                    </td>
                    <td>
                      <button className="btn btn-sec btn-xs" onClick={()=>openEdit(u)}>✏ Düzenle</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {/* Düzenleme modalı */}
      {editUser&&(
        <div className="ov" onClick={e=>e.target===e.currentTarget&&setEditUser(null)}>
          <div className="mbox" style={{maxWidth:520}}>
            <div className="mhd">
              <div>
                <div className="mtitle">Kullanıcı Düzenle</div>
                <div style={{fontSize:12,color:"var(--t3)",marginTop:2,fontFamily:"monospace"}}>{editUser.id?.slice(0,20)}…</div>
              </div>
              <button className="btn btn-ic" onClick={()=>setEditUser(null)}>✕</button>
            </div>
            <div className="g2" style={{marginBottom:14}}>
              <div className="irow"><span className="lbl">Ad Soyad</span><input className="field" value={editName} onChange={e=>setEditName(e.target.value)}/></div>
              <div className="irow">
                <span className="lbl">Rol</span>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {["personel","admin"].map(r=>(
                    <button key={r} type="button" onClick={()=>setEditRole(r)}
                      style={{padding:"9px",borderRadius:9,border:`1.5px solid ${editRole===r?"var(--accent)":"var(--border)"}`,background:editRole===r?"var(--accent-bg)":"var(--bg)",color:editRole===r?"var(--accent)":"var(--t2)",fontWeight:600,fontSize:12,cursor:"pointer",transition:"all .12s"}}>
                      {r==="admin"?"👑 Admin":"👤 Personel"}
                    </button>
                  ))}
                </div>
              </div>
            </div>
            {editRole!=="admin"&&(
              <div style={{marginBottom:16}}>

function StaffPage({cid, profile, showT}){

  const [perms,      setPerms     ] = useState({...DEFAULT_PERMS});
  const [editStaff,  setEditStaff ] = useState(null);
  const [editPerms,  setEditPerms ] = useState({});
  const [editName,   setEditName  ] = useState("");
  const [saving,     setSaving    ] = useState(false);

  const loadStaff=useCallback(async()=>{
    if(!sb||!cid){setLoading(false);return;}
    const{data,error}=await sb.from("profiles")
      .select("id,display_name,role,permissions,created_at")
      .eq("company_id",cid)
      .neq("role","admin");
    if(error) console.error("[StaffPage] yükleme hatası:",error.message);
    setStaffList(data||[]);
    setLoading(false);
  },[cid]);

  useEffect(()=>{loadStaff();},[loadStaff]);

  const togglePerm=(k)=>setPerms(p=>({...p,[k]:!p[k]}));
  const toggleEditPerm=(k)=>setEditPerms(p=>({...p,[k]:!p[k]}));

  const addStaff=async()=>{
    if(!email.trim()||!pass){showT("⚠ E-posta ve şifre zorunlu");return}
    if(pass.length<6){showT("⚠ Şifre en az 6 karakter");return}

      email:email.trim(), password:pass,
      options:{emailRedirectTo:window.location.origin, data:{company_name:profile?.company_name||""}}
    });
    if(error){showT("⚠ "+turkishAuthError(error.message));setSaving(false);return}
    const uid=data?.user?.id;
    if(uid){
      const{error:pe}=await sb.from("profiles").upsert({
        id:uid, display_name:name||email.split("@")[0],
        role:"personel", permissions:perms,
        company_id:cid, company_name:profile?.company_name||""
      },{onConflict:"id"});

    }

function App(){
  const TODAY=today();

  /* ── SETUP STATE ── */
  const [setupDone,setSetupDone]=useState(()=>{ return true; });

  /* ── APP VIEW ── landing | login | signup | app */
  const [appView,setAppView]=useState("landing");

  /* ═══════════════════════════════════════════════════════════
     AUTH STATE
     isLoading : true → spinner göster, menü ÇIZME
     authUser  : Supabase User (null = giriş yapılmamış)
     profile   : profiles tablosundan gelen satır
                 ÖZEL DEĞER: role="yetkisiz_misafir" → profil bulunamadı
  ═══════════════════════════════════════════════════════════ */
  const [isLoading, setIsLoading] = useState(true);
  const [authUser,  setAuthUser ] = useState(null);
  const [profile,   setProfile  ] = useState(null);

  /* ── APP STATE ── */
  const [dbReady,  setDbReady  ]=useState(false);
  const [dbError,  setDbError  ]=useState(false);
  const [page,     setPage     ]=useState("home");
  const [mobOpen,  setMobOpen  ]=useState(false);
  const [toast,    setToast    ]=useState("");
  const [hideAmt,  setHideAmt  ]=useState(false);

  const showT=useCallback((msg)=>{setToast(msg);setTimeout(()=>setToast(""),3500);},[]);

  /* ═══════════════════════════════════════════════════════════
     NORMALIZE PROFILE
     profiles tablosunda email sütunu YOK.
     Kullanıcı e-postası gerektiğinde authUser.email kullanılır.
     id → auth.uid() ile eşleşir, her zaman UUID'dir.
  ═══════════════════════════════════════════════════════════ */
  /* ═══════════════════════════════════════════════════════════════
     YETKİ SİSTEMİ — v14
     Tek kural: role === 'admin' ise HER ŞEY açık.
     Cache yok — her girişte Supabase'den taze veri.
  ═══════════════════════════════════════════════════════════════ */

  /* profile.role değeri ne olursa olsun, 'admin' mi değil mi? */
  /* ── company_id kısayolu + scoped DB wrappers ── */
  const cid=useMemo(()=>profile?.company_id||null,[profile]);
  /* Bu wrapper'ları kullan — company_id otomatik eklenir */
  const dbF=useCallback((t)=>sbF(t,cid),[cid]);
  const dbU=useCallback((t,rows)=>sbU(t,rows,cid),[cid]);

  const isAdmin = useMemo(()=>{
    if(!profile) return false;
    return (profile.role||"").trim().toLowerCase() === "admin";
  }, [profile]);

  /* Tek bir sekmenin görünüp görünmeyeceğini hesaplar */
  const canSeePage = useCallback((navKey)=>{
    if(!profile) return false;
    if(isAdmin)  return true;                     // admin her şeyi görür
    if(navKey==="home"||navKey==="settings") return true;
    if(navKey==="users"||navKey==="staff") return false; // sadece admin
    if(profile.role==="yetkisiz_misafir") return false;
    const req = NAV_PERM[navKey];
    if(!req) return true;
    return profile.permissions?.[req] === true;
  }, [profile, isAdmin]);

  /* Tekil izin kontrolü (silme butonu vb.) */
  const hasPerm = useCallback((k)=>{
    if(!profile)           return false;
    if(isAdmin)            return true;
    return profile.permissions?.[k] === true;
  }, [profile, isAdmin]);

  /* ─── PROFILE LOADER ───────────────────────────────────────────
     Cache YOK — her çağrıda Supabase'den taze çeker.
     Böylece Supabase'de role='admin' yapınca anında yansır.
  ──────────────────────────────────────────────────────────────── */
  const loadProfile = useCallback(async(uid)=>{
    if(!uid){ setIsLoading(false); return; }

    try{
      const {data, error} = await sb
        .from("profiles")
        .select("id, display_name, role, permissions")
        .eq("id", uid)
        .maybeSingle();

      if(error){
        console.error("[VT] profiles sorgu hatası:", error.code, error.message);
        /* RLS hatası olabilir — ama kullanıcı giriş yapmış.
           Güvenli fallback: yetkisiz_misafir göster, uyar. */
        setProfile({id:uid, role:"yetkisiz_misafir", display_name:"?", permissions:{}});
        setIsLoading(false);
        return;
      }

      if(!data){
        /* profiles tablosunda satır yok */
        console.warn(
          "[VT] profiles kaydı yok! uid:", uid,
          "\nSQL:\nINSERT INTO profiles(id,display_name,role,permissions) VALUES('"+uid+"','Admin','admin','{}');"
        );
        setProfile({id:uid, role:"yetkisiz_misafir", display_name:"Misafir", permissions:{}});
        setIsLoading(false);
        return;
      }

      /* Rol normalizasyonu — büyük/küçük harf fark etmez */
      const roleRaw  = (data.role || "personel").trim().toLowerCase();
      const roleNorm = roleRaw === "admin" ? "admin" : "personel";
      const p = { id:data.id, display_name:data.display_name||"", role:roleNorm, permissions:data.permissions||{} };
