                  {supSearch&&<span style={{fontSize:11.5,color:"var(--t3)"}}>{filteredSups.length} sonuç</span>}
                  <button className="btn btn-primary" onClick={()=>openSupModal(null)}>+ Tedarikçi Ekle</button>
                </div>
              </div>
              {filteredSups.length===0
                ?(<div className="card"><div className="empty"><div className="em-ic">📦</div><div className="em-title">{supSearch?"Tedarikçi bulunamadı":"Henüz tedarikçi eklenmemiş"}</div><div className="em-sub" style={{maxWidth:340,margin:"4px auto 0"}}>{supSearch?"Arama teriminizi değiştirin.":"İşbirliği yaptığınız alt müteahhit veya tedarikçileri ekleyerek cari takibi yapın."}</div></div></div>)
                :(
                <div className="tbl-wrap">
                  <table>
                    <thead>
                      <tr>
                        <th>Tedarikçi</th>
                        <th className="hide-mob">İletişim</th>
                        <th>Bakiye</th>
                        <th className="hide-mob">Son İşlem</th>
                        <th></th>
                      </tr>
                    </thead>
                    <tbody>
                      {filteredSups.map((s,i)=>{
                        const bal=entityBalance(ledger,"supplier",s.id);
                        const sJobs=jobs.filter(j=>j.supplierId===s.id);
                        const lastJob=sJobs.sort((a,b)=>b.date.localeCompare(a.date))[0];
                        const col=["#7C3AED","#0891B2","#D97706","#059669","#DC2626","#1B4FD8"][i%6];
                        const balPos=bal>0; // bize borçlu değil, biz borçluyuz
                        return(
                          <tr key={s.id} style={{cursor:"pointer"}} onClick={()=>setSupDetail(s.id)}>
                            <td>
                              <div style={{display:"flex",alignItems:"center",gap:10}}>
                                <div style={{width:34,height:34,borderRadius:9,background:col+"18",color:col,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,flexShrink:0,fontFamily:"'Syne',sans-serif"}}>{initials(s.title)}</div>
                                <div>
                                  <div style={{fontWeight:600,fontSize:13.5,color:"var(--t1)"}}>{s.title}</div>
                                </div>
                              </div>
                            </td>
                            <td className="hide-mob">
                              <div style={{fontSize:12.5,color:"var(--t2)"}}>{s.contact||"—"}</div>
                              {s.phone&&<div style={{fontSize:11.5,color:"var(--t3)",marginTop:1}}>{s.phone}</div>}
                            </td>
                            <td>
                              {bal===0
                                ?<span className="bal-pill" style={{background:"var(--accent-bg)",color:"var(--accent)"}}>Borç Yok</span>
                                :<span className="bal-pill" style={{background:balPos?"var(--red-bg)":"var(--green-bg)",color:balPos?"var(--red)":"var(--green)"}}>
                                  {balPos?`${mask(fmtPrice(bal))} Borçluyuz`:`${mask(fmtPrice(Math.abs(bal)))} Alacaklıyız`}
                                </span>
                              }
                            </td>
                            <td className="hide-mob" style={{fontSize:12,color:"var(--t3)"}}>
                              {lastJob?fmtDate(lastJob.date):"—"}
                            </td>
                            <td onClick={e=>e.stopPropagation()}>
                              <div style={{display:"flex",gap:4,justifyContent:"flex-end"}}>
                                <button className="btn btn-ic" style={{minWidth:32,minHeight:32}} onClick={()=>openSupModal(s)}>✏</button>
                                <button className="btn btn-ic" style={{minWidth:32,minHeight:32}} onClick={()=>setDelSup(s)}>✕</button>
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {/* ════ FİLO ════ */}
      {page==="cranes"&&(
        <div className="page">
          <div className="sec-hd" style={{marginBottom:16}}>
            <div className="sec-title">Filo ({cranes.length} Araç)</div>
            <button className="btn btn-primary" onClick={()=>setShowCraneModal(true)}>+ Araç Ekle</button>
          </div>
          <div className="g3">{cranes.map((c,i)=>{
            const col=CRANE_COLORS[i%CRANE_COLORS.length];
            const cjA=jobs.filter(j=>j.craneCode===c.code);
            const cjM=cjA.filter(j=>{const m=getMY(j.date);return m.year===todayMY.year&&m.month===todayMY.month});
            const tot=cjA.reduce((a,j)=>a+(j.price||0),0);const mC=cjM.reduce((a,j)=>a+(j.price||0),0);
            return(<div key={c.id} className="entity-card" style={{borderLeft:`3px solid ${col}`}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:11}}>
                <div style={{width:44,height:44,borderRadius:12,background:col+"18",color:col,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Syne',sans-serif",fontSize:15,fontWeight:800,flexShrink:0}}>{c.code.replace(/\D/g,"")}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div><div style={{fontFamily:"'Syne',sans-serif",fontSize:13.5,fontWeight:800}}>{c.code}</div><div style={{fontSize:12.5,fontWeight:600,color:col}}>{c.tonnage}</div></div>
                    <div style={{display:"flex",gap:4}}><button className="btn btn-ic" style={{fontSize:10}} onClick={()=>setEditCrane({...c})}>✏</button><button className="btn btn-ic" style={{fontSize:10}} onClick={()=>setDelCrane(c)}>✕</button></div>
                  </div>
                  <div style={{fontSize:11.5,color:"var(--t3)",marginTop:2}}>🔖 {c.plate}</div>
                  <div style={{fontSize:11.5,color:"var(--t3)"}}>👷 {c.operator}</div>
                </div>
              </div>
              <div style={{height:1,background:"var(--border)",marginBottom:9}}/>
              <div className="g2">
                <div style={{background:"var(--bg)",borderRadius:7,padding:"7px 9px"}}><div style={{fontSize:10,fontWeight:700,color:"var(--t3)",letterSpacing:.4,textTransform:"uppercase",marginBottom:2}}>{MONTHS[todayMY.month-1]}</div><div className="mono" style={{fontSize:11.5,fontWeight:600,color:col}}>{mask(fmtPrice(mC))}</div></div>
                <div style={{background:"var(--bg)",borderRadius:7,padding:"7px 9px"}}><div style={{fontSize:10,fontWeight:700,color:"var(--t3)",letterSpacing:.4,textTransform:"uppercase",marginBottom:2}}>Toplam</div><div className="mono" style={{fontSize:11.5,fontWeight:600}}>{mask(fmtPrice(tot))}</div></div>
              </div>
              <div style={{fontSize:11,color:"var(--t3)",marginTop:6}}>{cjA.length} iş · {cjM.length} bu ay</div>
            </div>);
          })}</div>
        </div>
      )}

      {/* ════ RAPORLAMA ════ */}
      {page==="report"&&(
        <div className="page">
          <div className="g2" style={{marginBottom:16,maxWidth:460}}>
            <div className="card" style={{padding:"15px 17px"}}><span className="lbl">Tarih Seçin</span><input type="date" className="field" value={reportDate} onChange={e=>setReportDate(e.target.value)}/></div>
            <div style={{display:"grid",gap:9}}>
              <div className="stat-card" style={{padding:"13px 15px"}}><div className="sc-lbl">Günlük Ciro</div><div className="sc-val" style={{fontSize:17,color:"var(--green)"}}>{fmtPrice(dailyCiro)}</div></div>
              <div className="stat-card" style={{padding:"13px 15px"}}><div className="sc-lbl">İş Sayısı</div><div className="sc-val" style={{fontSize:17,color:"var(--accent)"}}>{dailyJobs.length}</div></div>
            </div>
          </div>
          <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:13}}>
            <div className="sec-title">{fmtDate(reportDate)} — İş Listesi</div>
            <button className="btn btn-green" onClick={sendMail} style={{fontSize:12}}>✉️ Rapor Gönder</button>
          </div>
          {dailyJobs.length===0?(<div className="card"><div className="empty"><div className="em-ic">📋</div><div className="em-title">Kayıt yok</div></div></div>):(
            <div className="tbl-wrap"><table>
              <thead><tr><th>#</th><th>Araç</th><th>Müşteri</th><th className="hide-mob">Yer</th><th className="hide-mob">İş</th><th>Tutar</th><th></th></tr></thead>
              <tbody>{dailyJobs.map((j,idx)=>{const ci=cranes.findIndex(c=>c.code===j.craneCode);const col=ci>=0?CRANE_COLORS[ci%CRANE_COLORS.length]:"var(--accent)";const cust=cmap[j.customerId];return(<tr key={j.id}>
                <td style={{width:34}}><div style={{width:23,height:23,borderRadius:6,background:"var(--accent-bg)",color:"var(--accent)",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{idx+1}</div></td>
                <td><CraneChip code={j.craneCode} cranes={cranes} color={col}/></td>
                <td style={{fontWeight:600,fontSize:13}}>{cust?.title||"—"}</td>
                <td className="hide-mob" style={{color:"var(--t3)",fontSize:12.5}}>{j.location}</td>
                <td className="hide-mob" style={{color:"var(--t3)",fontSize:12.5}}>{j.work}</td>
                <td><span className="mono" style={{fontWeight:600,color:"var(--green)",fontSize:12.5}}>{j.price!=null?fmtPrice(j.price):"—"}</span></td>
                <td><button className="btn btn-ic" style={{fontSize:10}} onClick={()=>setDelJob(j)}>✕</button></td>
              </tr>)})}</tbody>
            </table></div>
          )}
          <div style={{textAlign:"center",fontSize:11,color:"var(--t3)",marginTop:8}}>eminncelikk@gmail.com adresine mail açar</div>
        </div>
      )}
    </div>{/* end main-wrap */}

    {/* ════════════════════════════════════════
        MODALS
    ════════════════════════════════════════ */}

    {/* ── YENİ İŞ ── */}
    {showJobModal&&(<div className="ov" onClick={e=>e.target===e.currentTarget&&(setShowJobModal(false),resetJob())}>
      <div className="mbox" style={{maxWidth: showInlineNewCust ? 640 : 500, transition:"max-width .25s ease"}}>
        <div className="mhd"><div className="mtitle">{editJobId?"İş Düzenle":"Yeni Satış Kaydı"}</div><button className="btn btn-ic" onClick={()=>{setShowJobModal(false);resetJob()}}>✕</button></div>

        {/* İki sütunlu layout — sağda inline müşteri formu açılır */}
        <div style={{display:"flex",gap:16}}>

          {/* Sol: asıl form */}
          <div style={{flex:1,minWidth:0}}>
            <div className="irow">
              <span className="lbl">Müşteri <span style={{color:"var(--red)"}}>*</span></span>
              <CustomerAC
                value={jobForm.customerId}
                onChange={id=>{setJobForm(f=>({...f,customerId:id}));setShowInlineNewCust(false);}}
                customers={customers}
                onAddNew={()=>{resetCust();setShowInlineNewCust(true);}}
              />
              {!jobForm.customerId&&!showInlineNewCust&&<div style={{fontSize:11,color:"var(--red)",marginTop:3}}>Müşteri seçilmeden iş kaydedilemez.</div>}
            </div>
            <div className="g2" style={{marginBottom:12}}>
              <div><span className="lbl">Tarih *</span><input type="date" className="field" value={jobForm.date} onChange={e=>setJobForm(f=>({...f,date:e.target.value}))}/></div>
              <div><span className="lbl">Tutanak No</span><input className="field" placeholder="TUT-010" value={jobForm.receiptNo} onChange={e=>setJobForm(f=>({...f,receiptNo:e.target.value}))}/></div>
            </div>
            <div className="irow"><span className="lbl">İşin Yapıldığı Yer *</span><input className="field" placeholder="Şantiye / adres" value={jobForm.location} onChange={e=>setJobForm(f=>({...f,location:e.target.value}))}/></div>
            <div className="irow">
              <span className="lbl">Araç {jobForm.supplierId?"(Taşeron)":"*"}</span>
              {jobForm.supplierId?(
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{flex:1,background:"var(--amber-bg)",border:"1.5px solid #FED7AA",borderRadius:9,padding:"9px 13px",fontSize:13,fontWeight:600,color:"var(--amber)"}}>🚛 Taşeron Araç</div>
                  <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                    <input className="field" style={{width:110,fontSize:13}} placeholder="Tonaj (65 Ton)" value={jobForm.subTonnage} onChange={e=>setJobForm(f=>({...f,subTonnage:e.target.value}))}/>
                  </div>
                </div>
              ):(
                <select className="field" value={jobForm.craneCode} onChange={e=>{if(e.target.value==="__new__"){setShowJobModal(false);setPage("cranes")}else setJobForm(f=>({...f,craneCode:e.target.value}))}}>
                  <option value="">— Araç seçin —</option>
                  {cranes.map(c=><option key={c.id} value={c.code}>{c.code} — {c.tonnage} — {c.operator}</option>)}
                  <option value="__new__">＋ Yeni Araç Ekle</option>
                </select>
              )}
            </div>
            <div className="irow"><span className="lbl">Yapılan İş *</span><input className="field" placeholder="İş tanımı" value={jobForm.work} onChange={e=>setJobForm(f=>({...f,work:e.target.value}))}/></div>
            <div className="irow">
              <span className="lbl">Tedarikçi <span style={{fontSize:10,color:"var(--t3)",textTransform:"none",fontWeight:400,letterSpacing:0}}>(opsiyonel)</span></span>
              <select className="field" value={jobForm.supplierId||""} onChange={e=>setJobForm(f=>({...f,supplierId:e.target.value?parseInt(e.target.value):null}))}>
                <option value="">— Tedarikçi yok —</option>
                {suppliers.map(s=><option key={s.id} value={s.id}>{s.title}{s.contact?` (${s.contact})`:""}</option>)}
              </select>
            </div>
            {jobForm.supplierId&&(<div className="irow" style={{background:"var(--purple-bg)",border:"1px solid #DDD6FE",borderRadius:9,padding:"11px 13px"}}>
              <span className="lbl" style={{color:"var(--purple)"}}>Tedarikçiye Ödenecek Ücret <span style={{fontSize:10,fontWeight:400,textTransform:"none",letterSpacing:0}}>(opsiyonel)</span></span>
              <input className="field mono" placeholder="0,00 ₺" value={supPrice.dsp?supPrice.dsp+" ₺":""} onKeyDown={supPrice.kd} onInput={supPrice.inp} onChange={()=>{}} inputMode="numeric" style={{borderColor:"#DDD6FE"}}/>
              <div style={{fontSize:11,color:"var(--purple)",marginTop:4,opacity:.75}}>Müşteriden alınan tutardan farklı olabilir.</div>
            </div>)}
            <div className="irow">
              <span className="lbl">Müşteriden Alınacak Fiyat (₺)</span>
              <input className="field mono" placeholder="0,00 ₺" value={price.dsp?price.dsp+" ₺":""} onKeyDown={price.kd} onInput={price.inp} onChange={()=>{}} inputMode="numeric"/>
            </div>
            {jobForm.supplierId&&(price.num||0)>0&&(supPrice.num||0)>0&&(()=>{const kar=(price.num||0)-(supPrice.num||0);const pos=kar>=0;return(<div style={{background:pos?"var(--green-bg)":"var(--red-bg)",border:`1px solid ${pos?"#BBF7D0":"#FCA5A5"}`,borderRadius:9,padding:"9px 13px",marginBottom:11,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:12,fontWeight:600,color:pos?"var(--green)":"var(--red)"}}>{pos?"📈 Tahmini Kâr":"📉 Tahmini Zarar"}</span><span className="mono" style={{fontSize:13.5,fontWeight:700,color:pos?"var(--green)":"var(--red)"}}>{fmtPrice(kar)}</span></div>)})()}
            <div className="irow">
              <span className="lbl">Çalışma Saatleri</span>
              <div style={{display:"grid",gridTemplateColumns:"1fr 16px 1fr",alignItems:"center",gap:7}}>
                <input type="time" className="field mono" value={jobForm.startTime} onChange={e=>{setFullDay(false);setJobForm(f=>({...f,startTime:e.target.value}))}}/>
                <div style={{textAlign:"center",color:"var(--t3)",fontWeight:600}}>–</div>
                <input type="time" className="field mono" value={jobForm.endTime} onChange={e=>{setFullDay(false);setJobForm(f=>({...f,endTime:e.target.value}))}}/>
              </div>
              <div className="toggle-row" onClick={()=>{const n=!fullDay;setFullDay(n);if(n)setJobForm(f=>({...f,startTime:"08:00",endTime:"17:00"}));else setJobForm(f=>({...f,startTime:"",endTime:""}))}}>
                <div className={"tog-track"+(fullDay?" on":"")}><div className="tog-thumb"/></div>
                <span className="tog-lbl">Günlük (08:00 – 17:00)</span>
              </div>
            </div>
            <div style={{fontSize:11,color:"var(--t3)",marginBottom:13}}>* Zorunlu alan. Saat, tutanak, fiyat sonradan girilebilir.</div>
            <button className="btn btn-primary btn-full" onClick={submitJob}>{editJobId?"Güncelle":"Kaydet"}</button>
          </div>

          {/* Sağ: inline yeni müşteri paneli */}
          {showInlineNewCust&&(
            <div style={{width:260,flexShrink:0,background:"var(--bg)",borderRadius:12,padding:"16px 14px",border:"1.5px solid var(--accent)",position:"relative",alignSelf:"flex-start"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div style={{fontFamily:"'Syne',sans-serif",fontSize:13,fontWeight:800,color:"var(--accent)"}}>Yeni Müşteri</div>
                <button className="btn btn-ic" style={{width:24,height:24,fontSize:11}} onClick={()=>{setShowInlineNewCust(false);resetCust();}}>✕</button>
              </div>
              <div className="irow"><span className="lbl">Unvan *</span><input className="field" style={{fontSize:13}} placeholder="Firma / şahıs" value={custForm.title} onChange={e=>setCustForm(f=>({...f,title:e.target.value}))}/></div>
              <div className="irow"><span className="lbl">Müşteri Kodu</span><input className="field" style={{fontSize:13}} placeholder="MUS-005" value={custForm.code} onChange={e=>setCustForm(f=>({...f,code:e.target.value}))}/></div>
              <div className="irow"><span className="lbl">Vergi Dairesi</span><input className="field" style={{fontSize:13}} placeholder="Kadıköy VD" value={custForm.taxOffice} onChange={e=>setCustForm(f=>({...f,taxOffice:e.target.value}))}/></div>
              <div className="irow"><span className="lbl">VKN</span><input className="field mono" style={{fontSize:13}} placeholder="10 haneli VKN" value={custForm.taxNo} onChange={e=>setCustForm(f=>({...f,taxNo:e.target.value}))}/></div>
              <div className="irow"><span className="lbl">Yetkili</span><input className="field" style={{fontSize:13}} placeholder="Ad Soyad" value={custForm.contact} onChange={e=>setCustForm(f=>({...f,contact:e.target.value}))}/></div>
              <div className="irow"><span className="lbl">Telefon</span><input className="field" style={{fontSize:13}} placeholder="0532 000 0000" value={custForm.phone} onChange={e=>setCustForm(f=>({...f,phone:e.target.value}))}/></div>
              {/* Tedarikçi de ekle */}
              <div onClick={()=>setIsAlsoSupplier(v=>!v)} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:8,border:`1.5px solid ${isAlsoSupplier?"var(--purple)":"var(--border)"}`,background:isAlsoSupplier?"var(--purple-bg)":"var(--surface)",cursor:"pointer",marginBottom:12,transition:"all .15s",userSelect:"none"}}>
                <div style={{width:18,height:18,borderRadius:5,border:`2px solid ${isAlsoSupplier?"var(--purple)":"var(--border2)"}`,background:isAlsoSupplier?"var(--purple)":"var(--surface)",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s"}}>
                  {isAlsoSupplier&&<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 3.5,7.5 8.5,2" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                </div>
                <span style={{fontSize:11.5,fontWeight:600,color:isAlsoSupplier?"var(--purple)":"var(--t2)"}}>Tedarikçi olarak da ekle</span>
              </div>
              <button className="btn btn-primary btn-full" style={{fontSize:13}} onClick={()=>{
                if(!custForm.title.trim()){showT("⚠ Müşteri unvanı zorunludur");return}
                submitCust(id=>{setJobForm(f=>({...f,customerId:id}));setShowInlineNewCust(false);});
              }}>✓ Ekle &amp; Seç</button>
            </div>
          )}

        </div>
      </div>
    </div>)}

    {/* ── TAHSİLAT / CARİ SEÇENEK ── */}
    {showCollectModal&&collectData&&(<div className="ov">
      <div className="mbox" style={{maxWidth:440}}>
        <div className="mhd">
          <div>
            <div className="mtitle">İş kaydedildi ✓</div>
            <div style={{fontSize:12,color:"var(--t3)",marginTop:2}}>{collectData.customerName} · {fmtPrice(collectData.amount)}</div>
          </div>
        </div>
        {/* Seçenek butonları */}
        {!collectData.mode&&(<>
          <div style={{fontSize:13,color:"var(--t2)",marginBottom:14,lineHeight:1.6}}>Bu iş için ödeme nasıl işlensin?</div>
          <div style={{display:"flex",flexDirection:"column",gap:9,marginBottom:8}}>
            <button onClick={()=>setCollectData(d=>({...d,mode:"cari"}))} style={{padding:"14px 16px",borderRadius:11,border:"1.5px solid var(--border)",background:"var(--bg)",cursor:"pointer",textAlign:"left",transition:"border-color .12s,background .12s"}} onMouseOver={e=>{e.currentTarget.style.borderColor="var(--accent)";e.currentTarget.style.background="var(--accent-bg)"}} onMouseOut={e=>{e.currentTarget.style.borderColor="var(--border)";e.currentTarget.style.background="var(--bg)"}}>
              <div style={{fontSize:14,fontWeight:700,color:"var(--t1)"}}>📒 Cariye Ekle</div>
              <div style={{fontSize:12,color:"var(--t3)",marginTop:3}}>Müşteri hesabına borç olarak işle. Ödeme daha sonra gelecek.</div>
            </button>
            <button onClick={()=>setCollectData(d=>({...d,mode:"tahsilat"}))} style={{padding:"14px 16px",borderRadius:11,border:"1.5px solid var(--border)",background:"var(--bg)",cursor:"pointer",textAlign:"left",transition:"border-color .12s,background .12s"}} onMouseOver={e=>{e.currentTarget.style.borderColor="var(--green)";e.currentTarget.style.background="var(--green-bg)"}} onMouseOut={e=>{e.currentTarget.style.borderColor="var(--border)";e.currentTarget.style.background="var(--bg)"}}>
              <div style={{fontSize:14,fontWeight:700,color:"var(--t1)"}}>💰 Tahsilat Kaydet</div>
              <div style={{fontSize:12,color:"var(--t3)",marginTop:3}}>Ödeme şimdi alındı. Kasa ve cari otomatik güncellenir.</div>
            </button>
            <button onClick={skipCollect} style={{padding:"10px 16px",borderRadius:11,border:"1.5px solid var(--border)",background:"none",cursor:"pointer",fontSize:13,color:"var(--t3)",fontWeight:500}}>
              Şimdilik geç
            </button>
          </div>
        </>)}

              <div onClick={()=>setIsAlsoSupplier(v=>!v)} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:8,border:`1.5px solid ${isAlsoSupplier?"var(--purple)":"var(--border)"}`,background:isAlsoSupplier?"var(--purple-bg)":"var(--surface)",cursor:"pointer",marginBottom:12,transition:"all .15s",userSelect:"none"}}>
                <div style={{width:18,height:18,borderRadius:5,border:`2px solid ${isAlsoSupplier?"var(--purple)":"var(--border2)"}`,background:isAlsoSupplier?"var(--purple)":"var(--surface)",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s"}}>
                  {isAlsoSupplier&&<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 3.5,7.5 8.5,2" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                </div>
                <span style={{fontSize:11.5,fontWeight:600,color:isAlsoSupplier?"var(--purple)":"var(--t2)"}}>Tedarikçi olarak da ekle</span>
              </div>
              <button className="btn btn-primary btn-full" style={{fontSize:13}} onClick={()=>{
                if(!custForm.title.trim()){showT("⚠ Müşteri unvanı zorunludur");return}
                submitCust(id=>{setPlanForm(f=>({...f,customerId:id}));setShowInlinePlanCust(false);});
              }}>✓ Ekle &amp; Seç</button>
            </div>
          )}
        </div>
      </div>
    </div>)}

    {/* ── ALIŞ MODALI ── */}
    {showPurchaseModal&&(<div className="ov" onClick={e=>e.target===e.currentTarget&&(setShowPurchaseModal(false),setShowInlineNewSup(false),resetSup())}>
      <div className="mbox" style={{maxWidth:showInlineNewSup?680:460,transition:"max-width .25s ease"}}>
        <div className="mhd"><div className="mtitle">{editPurchaseId?"Alış Düzenle":"Yeni Alış Kaydı"}</div><button className="btn btn-ic" onClick={()=>{setShowPurchaseModal(false);setEditPurchaseId(null);setShowInlineNewSup(false);resetSup();}}>✕</button></div>
        <div style={{display:"flex",gap:16}}>
          {/* Sol: alış formu */}
          <div style={{flex:1,minWidth:0}}>
            <div className="irow">
              <span className="lbl">Tedarikçi <span style={{color:"var(--red)"}}>*</span></span>
              <div style={{display:"flex",gap:0}}>
                <select
                  className="field"
                  style={{borderRadius:purchaseForm.supplierId?"9px":"9px 0 0 9px",flex:1}}
                  value={purchaseForm.supplierId||""}
                  onChange={e=>{setPurchaseForm(f=>({...f,supplierId:e.target.value?parseInt(e.target.value):null}));setShowInlineNewSup(false);}}
                >
                  <option value="">— Tedarikçi seçin —</option>
                  {suppliers.map(s=><option key={s.id} value={s.id}>{s.title}{s.contact?` (${s.contact})`:""}</option>)}
                </select>
                {!purchaseForm.supplierId&&(
                  <button type="button" className="ac-add" style={{borderRadius:"0 9px 9px 0"}} onClick={()=>{resetSup();setShowInlineNewSup(true);}}>+ Yeni</button>
                )}
              </div>
              {!purchaseForm.supplierId&&!showInlineNewSup&&<div style={{fontSize:11,color:"var(--red)",marginTop:3}}>Tedarikçi seçilmeden alış kaydedilemez.</div>}
            </div>
            <div className="g2" style={{marginBottom:12}}>
              <div><span className="lbl">Tarih *</span><input type="date" className="field" value={purchaseForm.date} onChange={e=>setPurchaseForm(f=>({...f,date:e.target.value}))}/></div>
              <div><span className="lbl">Tutanak / Fatura No</span><input className="field" placeholder="FAT-001" value={purchaseForm.receiptNo} onChange={e=>setPurchaseForm(f=>({...f,receiptNo:e.target.value}))}/></div>
            </div>
            <div className="irow"><span className="lbl">Açıklama *</span><input className="field" placeholder="Alınan ürün / hizmet" value={purchaseForm.description} onChange={e=>setPurchaseForm(f=>({...f,description:e.target.value}))}/></div>
            <div className="irow">
              <span className="lbl">Tutar (₺) *</span>
              <input className="field mono" placeholder="0,00 ₺" value={purchasePrice.dsp?purchasePrice.dsp+" ₺":""} onKeyDown={purchasePrice.kd} onInput={purchasePrice.inp} onChange={()=>{}} inputMode="numeric"/>
            </div>
            <div style={{fontSize:11,color:"var(--t3)",marginBottom:13}}>* Zorunlu alan.</div>
            <button className="btn btn-primary btn-full" onClick={async()=>{
              if(!purchaseForm.supplierId){showT("⚠ Tedarikçi seçin");return}
              if(!purchaseForm.description.trim()){showT("⚠ Açıklama girin");return}
              const amt=purchasePrice.num;if(!amt||amt<=0){showT("⚠ Tutar girin");return}
              if(editPurchaseId){
                // Düzenleme — sadece tedarikçi ücreti ve açıklamayı güncelle
                const updated=jobs.map(j=>j.id===editPurchaseId?{...j,date:purchaseForm.date,supplierId:purchaseForm.supplierId,work:purchaseForm.description,supplierPrice:amt,receiptNo:purchaseForm.receiptNo||""}:j);
                setJobs(updated);await dbU("jobs",[updated.find(j=>j.id===editPurchaseId)]);
                showT("✓ Alış güncellendi");
              } else {
                // Yeni kayıt
                const newJob={id:Date.now(),date:purchaseForm.date,customerId:null,supplierId:purchaseForm.supplierId,location:"",craneCode:cranes[0]?.code||"",work:purchaseForm.description,startTime:"",endTime:"",price:null,supplierPrice:amt,receiptNo:purchaseForm.receiptNo||""};
                setJobs(prev=>[newJob,...prev]);await dbU("jobs",[newJob]);
                const le={id:Date.now()+1,date:purchaseForm.date,entityType:"supplier",entityId:purchaseForm.supplierId,type:"debt",amount:amt,description:purchaseForm.description+(purchaseForm.receiptNo?" — "+purchaseForm.receiptNo:""),jobId:newJob.id,cashTxId:null};
                setLedger(prev=>[...prev,le]);await dbU("ledger",[le]);
                showT("✓ Alış kaydedildi");
              }
              setShowPurchaseModal(false);setEditPurchaseId(null);setShowInlineNewSup(false);resetSup();purchasePrice.reset();
            }}>{editPurchaseId?"Güncelle":"Kaydet"}</button>
          </div>
          {/* Sağ: inline yeni tedarikçi */}
          {showInlineNewSup&&(
            <div style={{width:260,flexShrink:0,background:"var(--bg)",borderRadius:12,padding:"16px 14px",border:"1.5px solid var(--purple)",alignSelf:"flex-start"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div style={{fontFamily:"'Syne',sans-serif",fontSize:13,fontWeight:800,color:"var(--purple)"}}>Yeni Tedarikçi</div>
                <button className="btn btn-ic" style={{width:24,height:24,fontSize:11}} onClick={()=>{setShowInlineNewSup(false);resetSup();}}>✕</button>
              </div>
              <div className="irow"><span className="lbl">Unvan *</span><input className="field" style={{fontSize:13}} placeholder="Firma / şahıs" value={supForm.title} onChange={e=>setSupForm(f=>({...f,title:e.target.value}))}/></div>
              <div className="irow"><span className="lbl">Yetkili</span><input className="field" style={{fontSize:13}} placeholder="Ad Soyad" value={supForm.contact} onChange={e=>setSupForm(f=>({...f,contact:e.target.value}))}/></div>
              <div className="irow"><span className="lbl">Telefon</span><input className="field" style={{fontSize:13}} placeholder="0532 000 0000" value={supForm.phone} onChange={e=>setSupForm(f=>({...f,phone:e.target.value}))}/></div>
              <button className="btn btn-full" style={{fontSize:13,background:"var(--purple)",color:"#fff",border:"none",borderRadius:9,padding:"11px",fontWeight:600,cursor:"pointer"}} onClick={async()=>{
                if(!supForm.title.trim()){showT("⚠ Tedarikçi unvanı zorunludur");return}
                const n={...supForm,id:Date.now()};
                setSuppliers(prev=>[...prev,n]);await dbU("suppliers",[n]);
                setPurchaseForm(f=>({...f,supplierId:n.id}));
                setShowInlineNewSup(false);resetSup();
                showT("✓ Tedarikçi eklendi");
              }}>✓ Ekle &amp; Seç</button>
            </div>
          )}
        </div>
      </div>
    </div>)}

    {/* ── EOD ── */}
    {showEod&&(<div className="eod-ov">
      <div className="eod-box">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
          <div><div style={{fontFamily:"'Syne',sans-serif",fontSize:17,fontWeight:800}}>🌙 Gün Sonu Kontrolü</div><div style={{fontSize:11.5,color:"var(--t3)",marginTop:3}}>Bugün ({fmtDate(TODAY)}) hangi işler yapıldı?</div></div>
          <button className="btn btn-ic" onClick={()=>setShowEod(false)}>✕</button>
        </div>
        <div style={{background:"var(--amber-bg)",border:"1px solid #FED7AA",borderRadius:9,padding:"9px 12px",margin:"11px 0",fontSize:12,color:"#92400E",lineHeight:1.6}}>✅ İşaretlenenler bugünkü kayıtlara <b>fiyatsız</b> eklenir.</div>
        <div style={{marginBottom:16}}>{planned.map(p=>(<div key={p.id} className="eod-row">
          <div className={"eod-cb"+(eodChecked[p.id]?" on":"")} onClick={()=>setEodChecked(prev=>({...prev,[p.id]:!prev[p.id]}))}>
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 3.5,7.5 8.5,2" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:600}}>{cmap[p.customerId]?.title||p.note||"—"}</div>
            <div style={{fontSize:11.5,color:"var(--t3)",marginTop:2,display:"flex",gap:8,flexWrap:"wrap"}}><span>📍{p.location}</span><span>🚛{p.craneCode}</span>{p.time&&<span>🕐{p.time}</span>}</div>
          </div>
        </div>))}</div>
        <div style={{display:"flex",gap:9}}>
          <button className="btn btn-sec" style={{flex:1}} onClick={()=>{setEodDate(TODAY);setEodChecked({});setShowEod(false)}}>Hiçbiri Yapılmadı</button>
          <button className="btn btn-green" style={{flex:2,justifyContent:"center",padding:"10px 16px"}} onClick={confirmEod}>✓ Onayla &amp; Kaydet</button>
        </div>
      </div>
    </div>)}

    {/* ── CONFIRMS ── */}
    {delJob&&(<div className="cov"><div className="cbox"><div style={{fontSize:26,textAlign:"center",marginBottom:9}}>🗑</div><div style={{fontFamily:"'Syne',sans-serif",fontSize:14.5,fontWeight:800,textAlign:"center",marginBottom:5}}>İşi Sil</div><div style={{fontSize:12.5,color:"var(--t3)",textAlign:"center",marginBottom:16,lineHeight:1.6}}><b style={{color:"var(--t1)"}}>{cmap[delJob.customerId]?.title||"?"}</b> — {delJob.work}<br/>Silmek istediğinize emin misiniz?</div><div className="g2"><button className="btn btn-sec btn-full" onClick={()=>setDelJob(null)}>Vazgeç</button><button className="btn btn-danger btn-full" onClick={()=>deleteJob(delJob.id)}>Evet, Sil</button></div></div></div>)}
    {delCrane&&(<div className="cov"><div className="cbox"><div style={{fontSize:26,textAlign:"center",marginBottom:9}}>🚧</div><div style={{fontFamily:"'Syne',sans-serif",fontSize:14.5,fontWeight:800,textAlign:"center",marginBottom:5}}>Aracı Sil</div><div style={{fontSize:12.5,color:"var(--t3)",textAlign:"center",marginBottom:16,lineHeight:1.6}}><b>{delCrane.code}</b> — {delCrane.operator}</div><div className="g2"><button className="btn btn-sec btn-full" onClick={()=>setDelCrane(null)}>Vazgeç</button><button className="btn btn-danger btn-full" onClick={()=>deleteCraneF(delCrane.id)}>Sil</button></div></div></div>)}
    {delCust&&(<div className="cov"><div className="cbox"><div style={{fontSize:26,textAlign:"center",marginBottom:9}}>🏢</div><div style={{fontFamily:"'Syne',sans-serif",fontSize:14.5,fontWeight:800,textAlign:"center",marginBottom:5}}>Müşteriyi Sil</div><div style={{fontSize:12.5,color:"var(--t3)",textAlign:"center",marginBottom:16,lineHeight:1.6}}><b>{delCust.title}</b><br/>Silmek istediğinize emin misiniz?</div><div className="g2"><button className="btn btn-sec btn-full" onClick={()=>setDelCust(null)}>Vazgeç</button><button className="btn btn-danger btn-full" onClick={()=>deleteCust(delCust.id)}>Sil</button></div></div></div>)}
    {delSup&&(<div className="cov"><div className="cbox"><div style={{fontSize:26,textAlign:"center",marginBottom:9}}>📦</div><div style={{fontFamily:"'Syne',sans-serif",fontSize:14.5,fontWeight:800,textAlign:"center",marginBottom:5}}>Tedarikçiyi Sil</div><div style={{fontSize:12.5,color:"var(--t3)",textAlign:"center",marginBottom:16,lineHeight:1.6}}><b>{delSup.title}</b><br/>Silmek istediğinize emin misiniz?</div><div className="g2"><button className="btn btn-sec btn-full" onClick={()=>setDelSup(null)}>Vazgeç</button><button className="btn btn-danger btn-full" onClick={()=>deleteSup(delSup.id)}>Sil</button></div></div></div>)}
    {delAcct&&(<div className="cov"><div className="cbox"><div style={{fontSize:26,textAlign:"center",marginBottom:9}}>🏦</div><div style={{fontFamily:"'Syne',sans-serif",fontSize:14.5,fontWeight:800,textAlign:"center",marginBottom:5}}>Hesabı Sil</div><div style={{fontSize:12.5,color:"var(--t3)",textAlign:"center",marginBottom:16,lineHeight:1.6}}><b>{delAcct.name}</b><br/>Tüm hareketler silinecektir.</div><div className="g2"><button className="btn btn-sec btn-full" onClick={()=>setDelAcct(null)}>Vazgeç</button><button className="btn btn-danger btn-full" onClick={()=>deleteAcct(delAcct.id)}>Sil</button></div></div></div>)}

      {/* ════ PERSONEL YÖNETİMİ ════ */}
      {page==="staff"&&(
        isAdmin
          ? <StaffPage cid={cid} profile={profile} showT={showT}/>
          : <div className="page"><div className="card"><div className="empty"><div className="em-ic">🔒</div><div className="em-title">Yetkisiz Erişim</div></div></div></div>
      )}
      {page==="settings"&&(
        <div className="page">
          <div style={{maxWidth:520}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:16,fontWeight:800,marginBottom:4}}>Ayarlar</div>
            <div style={{fontSize:12.5,color:"var(--t3)",marginBottom:24}}>Uygulama yapılandırması ve veri yönetimi</div>

            {/* Veri sıfırlama */}
            <div className="card" style={{borderTop:"3px solid var(--red)"}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:14}}>
                <div style={{width:40,height:40,borderRadius:10,background:"var(--red-bg)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--red)" strokeWidth="2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14,color:"var(--t1)",marginBottom:4}}>Uygulama Verilerini Sıfırla</div>
                  <div style={{fontSize:12.5,color:"var(--t3)",lineHeight:1.6,marginBottom:14}}>
                    Tüm satış, müşteri, tedarikçi, kasa ve planlama kayıtları <b style={{color:"var(--red)"}}>kalıcı olarak silinir</b>. Bu işlem geri alınamaz.
                  </div>
                  <button
                    className="btn"
                    style={{background:"var(--red)",color:"#fff",border:"none",padding:"9px 18px",fontSize:13,fontWeight:600}}
                    onClick={async()=>{
                      const ok=window.confirm("⚠️ Tüm verileriniz kalıcı olarak silinecek.\n\nBu işlem GERİ ALINAMAZ. Emin misiniz?");
                      if(!ok)return;
                      const ok2=window.confirm("Son onay: Tüm veriler silinsin mi?");
                      if(!ok2)return;

                      showT("⏳ Veriler siliniyor...");

                      if(sb){
                        /* neq("id",0) RLS'de bazen çalışmaz.
                           gte("id",0) bigint için, gt("created_at","1900-01-01") text id'ler için */
                        const dels=await Promise.allSettled([
                          sb.from("jobs").delete().gte("id",0),
                          sb.from("customers").delete().gte("id",0),
                          sb.from("suppliers").delete().gte("id",0),
                          sb.from("cranes").delete().gte("id",0),
                          sb.from("accounts").delete().gte("id",0),
                          sb.from("cash_txs").delete().gte("id",0),
                          sb.from("ledger").delete().gte("id",0),
                          sb.from("planned").delete().gte("id",0),
                        ]);
                        const errs=dels.filter(r=>r.status==="rejected"||r.value?.error);
                        if(errs.length>0){
                          console.warn("[VT] Bazı tablolar silinemedi:",errs);
                          showT("⚠ Bazı tablolar silinemedi — konsolu kontrol edin");
                          return;
                        }
                      }

                      /* localStorage temizle */
                      ["vinc_cranes","vinc_jobs","vinc_customers","vinc_suppliers",
                       "vinc_accounts","vinc_cash_txs","vinc_ledger","vinc_planned","vinc_eod_date"]
                        .forEach(k=>localStorage.removeItem(k));

                      /* State sıfırla — INIT verisi değil, tamamen boş */
                      setCranes([]);setJobs([]);setCustomers([]);
                      setSuppliers([]);setAccounts([]);
                      setCashTxs([]);setLedger([]);setPlanned([]);

                      showT("✓ Tüm veriler silindi. Tablo yapıları ve profil korundu.");
                      setPage("home");
                    }}
                  >
                    Tüm Verileri Sil
                  </button>
                </div>
              </div>
            </div>

            {/* Bağlantı bilgisi */}
            <div className="card" style={{marginTop:16}}>
              <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>Bağlantı Bilgisi</div>
              <div className="kv-row"><div className="kv-key">Supabase URL</div><div className="kv-val mono" style={{fontSize:11,wordBreak:"break-all"}}>{SB_URL||"Bağlı değil"}</div></div>
              <div className="kv-row"><div className="kv-key">Durum</div><div className="kv-val">{sb?<span style={{color:"var(--green)",fontWeight:600}}>✓ Bağlı</span>:<span style={{color:"var(--red)",fontWeight:600}}>✗ Bağlı değil</span>}</div></div>
              <div className="kv-row"><div className="kv-key">Kullanıcı</div><div className="kv-val">{authUser?.email||"—"}</div></div>
              <div className="kv-row"><div className="kv-key">Rol</div><div className="kv-val">{isAdmin?"👑 Admin":"👤 Personel"}</div></div>
              <button className="btn btn-sec btn-xs" style={{marginTop:10}} onClick={()=>{localStorage.removeItem("sb_url");localStorage.removeItem("sb_anon");localStorage.removeItem("sb_skip");window.location.reload()}}>
                Supabase Bağlantısını Sıfırla
              </button>
            </div>
          </div>
        </div>
      )}

    {/* ── TOAST ── */}
    {toast&&(<div className="toast" style={{background:toast.startsWith("⚠")?"var(--red)":toast.startsWith("🗑")?"var(--amber)":"var(--t1)",color:"#fff"}}>{toast}</div>)}
  </div>);
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
